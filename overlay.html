<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var q=new URLSearchParams(location.search);if(q.get('canvas')!=='1'&&q.get('edit')!=='1'&&q.get('test')!=='1'){location.replace('/canvas.html');}})();</script>
<meta charset="UTF-8">
<title>SU2026 Overlay</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#6b1d29; --maroon-deep:#4e131d; --maroon-line:#7d2433;
    --gold:#ffb320; --gold-soft:#ffc95e; --red:#c31f2f; --red-deep:#8f1622;
    --cream:#f6e7c9; --cream-dim:#dcc9a4;
  }
  html,body{margin:0;padding:0;background:transparent;overflow:hidden}
  body{font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  #card{
    display:flex;align-items:center;gap:18px;
    min-width:520px;max-width:920px;
    position:fixed;top:14px;left:14px;
    background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-deep) 100%);
    border:3px solid var(--gold);
    box-shadow:0 14px 40px -8px rgba(0,0,0,.6),
               inset 0 0 0 3px var(--maroon-deep),
               inset 0 0 0 5px var(--red);
    border-radius:18px;
    padding:14px 24px 13px 18px;color:var(--cream);
  }
  .crest{width:104px;height:104px;flex-shrink:0;object-fit:contain;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
  .cwrap{flex:1;min-width:0}
  .eyebrow{font-family:'Graduate',serif;font-size:13px;letter-spacing:2.5px;
    color:var(--gold);display:flex;align-items:center;gap:9px;
    text-shadow:1px 1px 0 var(--red-deep)}
  .eyebrow .star{color:var(--red);text-shadow:none;font-size:11px}
  .eyebrow .yr{color:var(--cream-dim);letter-spacing:2px}
  .mainrow{display:flex;align-items:center;gap:14px;margin-top:9px;flex-wrap:wrap}
  .pill{flex-shrink:0;font-family:'Graduate',serif;font-size:12px;letter-spacing:1.5px;
    padding:6px 13px 5px;border-radius:8px;display:flex;align-items:center;gap:8px;
    text-transform:uppercase}
  .pill .d{width:8px;height:8px;border-radius:50%}
  .pill.live{background:var(--gold);color:var(--maroon-deep);
    box-shadow:0 2px 0 var(--red-deep)}
  .pill.live .d{background:var(--red);animation:pulse 1.4s ease-in-out infinite}
  .pill.break{background:transparent;color:var(--gold);border:2px solid var(--gold)}
  .pill.break .d{background:var(--gold)}
  .pill.soon{background:transparent;color:var(--gold);border:2px solid var(--gold)}
  .pill.soon .d{background:var(--gold);animation:pulse 1.4s ease-in-out infinite}
  .pill.done{background:transparent;color:var(--cream-dim);border:2px solid var(--cream-dim)}
  .pill.done .d{background:var(--cream-dim)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  #title{font-family:'Graduate',serif;font-size:33px;line-height:1.12;color:var(--gold);
    text-shadow:2px 2px 0 var(--red-deep),3px 3px 0 rgba(0,0,0,.35)}
  #sub{margin-top:6px;font-size:16px;font-weight:700;color:var(--cream-dim);letter-spacing:.3px}
  #sub b{color:var(--cream)}
  .nextrow{display:flex;align-items:baseline;gap:11px;margin-top:12px;padding-top:11px;
    border-top:2px solid rgba(255,179,32,.3);font-size:15px;font-weight:700;flex-wrap:wrap}
  .nx{font-family:'Graduate',serif;font-size:11.5px;letter-spacing:2px;color:var(--gold);
    text-transform:uppercase}
  #nextlabel{color:var(--cream-dim)}
  #nextlabel b{color:var(--cream)}
  #count{margin-left:auto;font-weight:800;color:var(--gold-soft);
    font-variant-numeric:tabular-nums;font-size:17px}
  #count.hot{color:#fff;animation:pulse 1.2s ease-in-out infinite}
  .swap{animation:swap .5s ease}
  @keyframes swap{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:none}}
  #card.hide{opacity:0}
  #card{transition:opacity .4s}
</style>
</head>
<body>
<div id="card" class="hide">
  <img class="crest" src="crest.png" alt="">
  <div class="cwrap">
    <div class="eyebrow">Streamer University <span class="star">★</span> <span class="yr">2026 · FTGIOO</span></div>
    <div class="mainrow">
      <span id="pill" class="pill live"><span class="d"></span><span id="pilltext">In class</span></span>
      <span id="title">Loading…</span>
    </div>
    <div id="sub"></div>
    <div class="nextrow" id="nextrow">
      <span class="nx" id="nx">Up next</span>
      <span id="nextlabel"></span>
      <span id="count"></span>
    </div>
  </div>
</div>

<script>
const Q=new URLSearchParams(location.search);
const API=Q.get('api')||'https://ftgioo-su2026-api-production.up.railway.app';
let SCHED=null, eff=null, target=null, lastKey='';

// URL params: ?pos=tl|tr|bl|br|bc  ?scale=1.4  ?bg=00ff00 (chroma key) or ?bg=green
(function(){
  const bg=Q.get('bg');
  if(bg) document.body.style.background=/^[0-9a-fA-F]{6}$/.test(bg)?('#'+bg):bg;
  const card=document.getElementById('card');
  const pos=(Q.get('pos')||'tl').toLowerCase();
  const s=parseFloat(Q.get('scale')||'1')||1;
  const off='14px';
  const P={tl:{top:off,left:off,o:'top left'},
           tr:{top:off,right:off,o:'top right'},
           bl:{bottom:off,left:off,o:'bottom left'},
           br:{bottom:off,right:off,o:'bottom right'},
           bc:{bottom:off,left:'50%',o:'bottom center',x:true}};
  const p=P[pos]||P.tl;
  card.style.top=card.style.left=card.style.right=card.style.bottom='';
  ['top','left','right','bottom'].forEach(k=>{if(p[k])card.style[k]=p[k];});
  card.style.transformOrigin=p.o;
  card.style.transform=(p.x?'translateX(-50%) ':'')+(s!==1?('scale('+s+')'):'');
})();

// Free positioning (?px=..&py=.. percent of screen) + drag/resize editor (?edit=1)
(function(){
  const el=document.getElementById('card');
  let s=parseFloat(Q.get('scale')||'1')||1;
  if(Q.has('px')||Q.has('py')){
    el.style.left=(parseFloat(Q.get('px'))||0)+'%';
    el.style.top=(parseFloat(Q.get('py'))||0)+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform=s!==1?('scale('+s+')'):'';
  }
  if(Q.get('edit')!=='1') return;
  // stream-accurate stage: a 16:9 frame that IS the 1920x1080 stream canvas
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;inset:0;background:#0c0d12;display:flex;align-items:center;justify-content:center;z-index:1';
  const frame=document.createElement('div');
  frame.style.cssText='position:relative;aspect-ratio:16/9;width:min(100vw - 16px,(100vh - 116px)*16/9);background-color:#161a22;background-image:repeating-linear-gradient(0deg,transparent 0 59px,#ffffff0d 59px 60px),repeating-linear-gradient(90deg,transparent 0 59px,#ffffff0d 59px 60px);border:1px solid #3a3f4c;border-radius:6px;overflow:hidden;box-shadow:0 20px 60px -20px #000';
  const ftag=document.createElement('div');
  ftag.style.cssText='position:absolute;bottom:6px;right:10px;color:#5b6270;font:700 11px Archivo,sans-serif;letter-spacing:1px;pointer-events:none';
  ftag.textContent='STREAM FRAME · 1920 × 1080';
  frame.appendChild(ftag);
  stage.appendChild(frame);
  document.body.appendChild(stage);
  frame.appendChild(el);
  el.style.position='absolute'; el.style.zIndex='2'; el.style.visibility='';
  const fw=()=>frame.getBoundingClientRect();
  const fscale=()=>fw().width/1920;
  function place(pxPct,pyPct){
    el.style.left=pxPct+'%'; el.style.top=pyPct+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform='scale('+(s*fscale())+')';
  }
  const spx=parseFloat(Q.get('px')), spy=parseFloat(Q.get('py'));
  place(isNaN(spx)?4:spx, isNaN(spy)?6:spy);
  const ecss=document.createElement('style');
  ecss.textContent='#edittb{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:6px;align-items:center;background:#1b1016;border:2px solid #ffb320;border-radius:10px;padding:8px 10px;font-family:Archivo,sans-serif;max-width:96vw;flex-wrap:wrap;justify-content:center}#edittb button{background:#ffb320;border:none;border-radius:6px;font-weight:800;font-size:15px;width:32px;height:32px;cursor:pointer}#edittb .cp{width:auto;padding:0 12px;font-size:12px}#edittb input{width:min(280px,40vw);font-size:11px;padding:7px;border-radius:6px;border:1px solid #7d2433;background:#2a161d;color:#f6e7c9}#edittb span{color:#ffb320;font-weight:800;font-size:13px;min-width:46px;text-align:center}';
  document.head.appendChild(ecss);
  const tb=document.createElement('div'); tb.id='edittb';
  tb.innerHTML='<button id="eMinus">−</button><span id="eScale"></span><button id="ePlus">+</button><input id="eUrl" readonly><button id="eCopy" class="cp">Copy URL</button><button id="eSave" class="cp">💾 Save live</button><button id="eHide" class="cp">👁 Hide</button>';
  document.body.appendChild(tb);
  function pcts(){ const r=el.getBoundingClientRect(), f=fw();
    return {px:+(((r.left-f.left)/f.width)*100).toFixed(2), py:+(((r.top-f.top)/f.height)*100).toFixed(2)}; }
  function urlNow(){ const q=new URLSearchParams(location.search);
    q.delete('edit'); q.delete('pos');
    if(s!==1) q.set('scale',s.toFixed(2)); else q.delete('scale');
    const p=pcts(); q.set('px',p.px); q.set('py',p.py);
    return location.origin+location.pathname+'?'+q.toString(); }
  function refresh(){ document.getElementById('eScale').textContent=s.toFixed(2)+'×';
    el.style.transform='scale('+(s*fscale())+')';
    document.getElementById('eUrl').value=urlNow(); }
  document.getElementById('ePlus').onclick=()=>{s=Math.min(3,+(s+0.05).toFixed(2));refresh();};
  document.getElementById('eMinus').onclick=()=>{s=Math.max(0.4,+(s-0.05).toFixed(2));refresh();};
  document.getElementById('eCopy').onclick=()=>{const i=document.getElementById('eUrl');
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(i.value);
    else{i.select();try{document.execCommand('copy')}catch(e){}}
    const b=document.getElementById('eCopy');b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy URL';},1200);};
  document.getElementById('eSave').onclick=async()=>{const b=document.getElementById('eSave');b.textContent='Saving…';
    try{const p=pcts();await ovPost({px:p.px,py:p.py,scale:+s.toFixed(2)});b.textContent='Saved, live!';}
    catch(err){b.textContent='Failed: '+err.message;}
    setTimeout(()=>{b.textContent='💾 Save live';},2200);};
  let hiddenNow=false;
  document.getElementById('eHide').onclick=async()=>{const b=document.getElementById('eHide');
    try{hiddenNow=!hiddenNow;await ovPost({hidden:hiddenNow});b.textContent=hiddenNow?'👁 Show':'👁 Hide';}
    catch(err){hiddenNow=!hiddenNow;}};
  el.style.cursor='move'; el.style.touchAction='none';
  let drag=null;
  el.addEventListener('pointerdown',e=>{const r=el.getBoundingClientRect();
    drag={dx:e.clientX-r.left,dy:e.clientY-r.top}; el.setPointerCapture(e.pointerId); e.preventDefault();});
  el.addEventListener('pointermove',e=>{ if(!drag)return; const f=fw();
    el.style.left=(e.clientX-drag.dx-f.left)+'px'; el.style.top=(e.clientY-drag.dy-f.top)+'px'; refresh();});
  el.addEventListener('pointerup',()=>{drag=null;refresh();});
  addEventListener('resize',()=>{ const p=pcts(); place(p.px,p.py); refresh(); });
  refresh();
})();

const $=id=>document.getElementById(id);
function isClass(sec){ return !!(sec&&sec.current&&sec.current.indexOf('🔔')===0); }
function profOf(sec){
  if(!sec||!sec.professor) return '';
  const m=sec.professor.match(/Now teaching:\s*([^(]+?)\s*\(/);
  return m?m[1].trim():'';
}
function fmtTime(min){
  let h=Math.floor(min/60), m=min%60, ap=h>=12?'PM':'AM';
  h=h%12; if(h===0)h=12;
  return h+(m?(':'+String(m).padStart(2,'0')):':00')+' '+ap;
}
function nextClassAfter(dayId,si){
  const di=SCHED.days.findIndex(d=>d.id===dayId); if(di<0)return null;
  for(let i=si+1;i<SCHED.days[di].sections.length;i++){
    const s=SCHED.days[di].sections[i];
    if(isClass(s)) return {date:SCHED.days[di].date,min:s.min,label:s.label,prof:profOf(s)};
  }
  for(let d=di+1;d<SCHED.days.length;d++)
    for(const s of SCHED.days[d].sections)
      if(isClass(s)) return {date:SCHED.days[d].date,min:s.min,label:s.label,prof:profOf(s)};
  return null;
}
function ctNowSec(){
  const f=new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',
    day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const o={}; f.formatToParts(new Date()).forEach(p=>o[p.type]=p.value);
  let h=parseInt(o.hour,10); if(h===24)h=0;
  return (+o.day)*86400 + h*3600 + (+o.minute)*60 + (+o.second);
}

function render(){
  if(!SCHED||!eff) return;
  const day=SCHED.days.find(d=>d.id===eff.day); if(!day) return;
  const sec=day.sections[Math.min(eff.section,day.sections.length-1)];
  const nxt=nextClassAfter(eff.day,eff.section);
  target = nxt ? {abs:nxt.date*86400+nxt.min*60} : null;

  const key=eff.day+':'+eff.section;
  const changed=key!==lastKey; lastKey=key;

  const pill=$('pill'), pt=$('pilltext'), title=$('title'), sub=$('sub'),
        nrow=$('nextrow'), nl=$('nextlabel'), nx=$('nx');

  if(isClass(sec)){
    pill.className='pill live'; pt.textContent='In class';
    title.textContent=sec.label;
    const p=profOf(sec);
    sub.innerHTML=p?('Professor · <b>'+p+'</b>'):'';
    sub.style.display=p?'':'none';
    if(nxt){ nx.textContent='Up next';
      nl.innerHTML='<b>'+nxt.label+'</b> · '+fmtTime(nxt.min); nrow.style.display=''; }
    else nrow.style.display='none';
  }else if(nxt){
    const isSetup=sec.label&&sec.label.toLowerCase().indexOf('setup')>=0;
    const isEnd=sec.label&&/wrap|graduation/i.test(sec.label);
    pill.className='pill '+(isSetup?'soon':(isEnd?'done':'break'));
    pt.textContent=isSetup?'Starting soon':(isEnd?'Done for today':'On break');
    title.textContent=nxt.label;
    sub.innerHTML='Professor · <b>'+nxt.prof+'</b>';
    sub.style.display='';
    nx.textContent='Starts';
    nl.innerHTML='<b>'+fmtTime(nxt.min)+'</b> Central';
    nrow.style.display='';
  }else{
    pill.className='pill done'; pt.textContent='Semester complete';
    title.textContent='That’s a wrap! 🎓';
    sub.textContent='Thank you for an incredible weekend of Streamer University.';
    sub.style.display='';
    nrow.style.display='none';
  }
  if(changed){ title.classList.remove('swap'); void title.offsetWidth; title.classList.add('swap'); }
  $('card').classList.remove('hide');
}

function tick(){
  const c=$('count');
  if(!target){ c.textContent=''; return; }
  const diff=target.abs-ctNowSec();
  if(diff<=0){ c.textContent='starting now!'; c.className='hot'; return; }
  const h=Math.floor(diff/3600), m=Math.floor((diff%3600)/60), s=diff%60;
  c.textContent='in '+(h?h+':'+String(m).padStart(2,'0'):m)+':'+String(s).padStart(2,'0');
  c.className=diff<300?'hot':'';
}

async function poll(){
  try{
    const r=await fetch(API+'/api/state',{cache:'no-store'});
    const j=await r.json();
    if(j.ok){ eff=j.effective; render(); }
  }catch(e){/* keep last */}
}
async function boot(){
  for(let i=0;i<20&&!SCHED;i++){
    try{ const r=await fetch(API+'/api/schedule',{cache:'no-store'}); SCHED=await r.json(); }
    catch(e){ await new Promise(res=>setTimeout(res,3000)); }
  }
  await poll();
  setInterval(poll,10000);
  setInterval(tick,500);
}
boot();

/* ---------- live remote settings (Save live in ?edit=1 controls the on-air overlay) ---------- */
const OVKEY='classcard';
let ovCfg=null;
function getSess(){ try{return JSON.parse(localStorage.getItem('su_hub_sess'));}catch(e){return null;} }
function askLogin(){
  return new Promise(function(resolve,reject){
    var old=document.getElementById('sulogin'); if(old) old.remove();
    var css=document.getElementById('sulogincss');
    if(!css){ css=document.createElement('style'); css.id='sulogincss';
      css.textContent='#sulogin{position:fixed;inset:0;background:rgba(10,5,8,.78);display:flex;align-items:center;justify-content:center;z-index:999;font-family:Archivo,sans-serif}#sulogin .bx{width:min(360px,92vw);background:linear-gradient(160deg,#3d1620,#24101a);border:3px solid #ffb320;border-radius:16px;padding:22px;text-align:center;box-shadow:0 30px 80px -20px #000,inset 0 0 0 3px #24101a,inset 0 0 0 5px #c31f2f}#sulogin h3{margin:0 0 4px;font-family:Graduate,serif;color:#ffb320;font-size:15px;letter-spacing:1.5px;text-shadow:1px 1px 0 #8f1622}#sulogin .m{color:#dcc9a4;font-size:12px;margin-bottom:14px}#sulogin .us{display:flex;gap:7px;margin-bottom:11px}#sulogin .u{flex:1;padding:11px 2px;border-radius:9px;border:2px solid #5d2b3c;background:#33161f;color:#c9ab9a;font-family:Graduate,serif;font-size:12.5px;cursor:pointer}#sulogin .u.sel{border-color:#ffb320;color:#ffb320;background:#3d1c14}#sulogin input{width:100%;box-sizing:border-box;background:#33161f;border:1px solid #5d2b3c;color:#f6e7c9;border-radius:9px;padding:11px;font-size:16px;text-align:center;margin-bottom:11px}#sulogin .bt{display:flex;gap:8px}#sulogin button.go{flex:1;background:#ffb320;color:#2a1108;border:none;border-radius:9px;padding:11px;font-weight:800;font-size:13px;cursor:pointer}#sulogin button.cx{flex:1;background:#33161f;color:#f6e7c9;border:1px solid #5d2b3c;border-radius:9px;padding:11px;font-weight:800;font-size:13px;cursor:pointer}#sulogin .er{color:#ff8a8a;font-size:12px;font-weight:700;min-height:16px;margin-top:8px}';
      document.head.appendChild(css);
    }
    var wrap=document.createElement('div'); wrap.id='sulogin';
    wrap.innerHTML='<div class="bx"><h3>Streamer University</h3><div class="m">Confirm your identity to control the live stream</div><div class="us"><button class="u sel" data-u="tdot">Tdot</button><button class="u" data-u="haylee">Haylee</button><button class="u" data-u="gio">Gio</button></div><input type="password" placeholder="your password" autocomplete="current-password"><div class="bt"><button class="go">Confirm</button><button class="cx">Cancel</button></div><div class="er"></div></div>';
    document.body.appendChild(wrap);
    var user='tdot';
    wrap.querySelectorAll('.u').forEach(function(b){ b.onclick=function(){ user=b.dataset.u;
      wrap.querySelectorAll('.u').forEach(function(x){x.classList.toggle('sel',x===b);}); }; });
    var inp=wrap.querySelector('input'), er=wrap.querySelector('.er'), go=wrap.querySelector('.go');
    setTimeout(function(){ inp.focus(); },50);
    function submit(){
      if(!inp.value){ er.textContent='Enter your password.'; return; }
      go.textContent='Checking…'; go.disabled=true;
      fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user:user,pass:inp.value})})
      .then(function(r){ return r.json().then(function(j){ return {r:r,j:j}; }); })
      .then(function(x){
        if(x.r.ok&&x.j.ok){
          try{ localStorage.setItem('su_hub_sess',JSON.stringify({token:x.j.token,user:x.j.user,exp:x.j.exp})); }catch(e){}
          wrap.remove(); resolve(x.j.token);
        }else{
          er.textContent=(x.j&&x.j.error)||'Login failed.';
          go.textContent='Confirm'; go.disabled=false;
        }
      })
      .catch(function(){ er.textContent='Cannot reach the server. Try again.'; go.textContent='Confirm'; go.disabled=false; });
    }
    go.onclick=submit;
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });
    wrap.querySelector('.cx').onclick=function(){ wrap.remove(); reject(new Error('Cancelled')); };
  });
}
async function ovToken(){ var s0=getSess(); if(s0&&s0.token) return s0.token; return askLogin(); }
async function ovPost(cfg){
  var token=await ovToken();
  var r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:OVKEY,cfg:cfg,token:token})});
  if(r.status===403){
    try{ localStorage.removeItem('su_hub_sess'); }catch(e){}
    token=await askLogin();
    r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:OVKEY,cfg:cfg,token:token})});
  }
  var j=await r.json().catch(function(){ return {}; });
  if(!r.ok||!j.ok) throw new Error((j&&j.error)||('HTTP '+r.status));
  return j;
}
let suCalEl=null;
function suCalib(on){
  if(on && !suCalEl){
    suCalEl=document.createElement('div');
    suCalEl.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:998;border:10px solid #ff2d95;box-sizing:border-box';
    suCalEl.innerHTML='<div style="position:absolute;top:0;left:0;width:46px;height:46px;background:#ff2d95"></div><div style="position:absolute;top:0;right:0;width:46px;height:46px;background:#ff2d95"></div><div style="position:absolute;bottom:0;left:0;width:46px;height:46px;background:#ff2d95"></div><div style="position:absolute;bottom:0;right:0;width:46px;height:46px;background:#ff2d95"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#14060b;border:3px solid #ff2d95;border-radius:14px;padding:18px 26px;font-family:Archivo,sans-serif;color:#fff;font-weight:800;font-size:20px;text-align:center;max-width:70%">CALIBRATION MODE<br><span style="font-size:15px;font-weight:700;color:#ffd6ec">The pink border must touch all 4 edges of the stream.<br>If it does not: in TVU Go, reset THIS overlay layer to full screen (no move, no resize).<br>Turn calibration off in the hub when done.</span></div>';
    document.body.appendChild(suCalEl);
  } else if(!on && suCalEl){ suCalEl.remove(); suCalEl=null; }
}
function applyOvCfg(){
  if(Q.get('edit')==='1'||!ovCfg) return;
  suCalib(!!ovCfg.calib);   // never fight the editor
  const el=document.getElementById('card');
  el.style.visibility=ovCfg.hidden?'hidden':'';
  if(typeof ovCfg.px==='number'&&typeof ovCfg.py==='number'){
    el.style.left=ovCfg.px+'%'; el.style.top=ovCfg.py+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    const sc=(typeof ovCfg.scale==='number')?ovCfg.scale:1;
    el.style.transform=sc!==1?('scale('+sc+')'):'';
  }
}
async function pollOvCfg(){
  try{ const r=await fetch(API+'/api/overlay',{cache:'no-store'}); const j=await r.json();
    if(j.ok){ ovCfg=(j.overlays&&j.overlays[OVKEY])||{}; applyOvCfg(); } }catch(e){}
}
pollOvCfg(); setInterval(pollOvCfg,9000);
</script>
