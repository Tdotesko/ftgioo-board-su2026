<meta charset="utf-8">
<title>FTGIOO Scene</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Archivo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  #su-stage{position:fixed;top:0;left:0;width:1920px;height:1080px;
    transform-origin:top left;transform:scale(var(--suk,1));will-change:transform}
  #su-bg{position:absolute;inset:0;opacity:0;pointer-events:none}
  #su-custom{position:absolute;inset:0;font-family:Archivo,-apple-system,sans-serif;color:#fff}
  #su-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:Archivo,sans-serif;color:#f6e7c9;background:#4e131de6;border:2px solid #ffb320;
    border-radius:14px;padding:22px 30px;text-align:center;max-width:70%;line-height:1.5}
</style>
<div id="su-stage"><div id="su-bg"></div><div id="su-custom"></div></div>
<script>
// Generic FTGIOO overlay "scene". Renders whatever CSS/HTML/JS is stored for
// this scene id under /api/overlay. Build + edit it live from the hub; this is
// the URL you paste into OBS / TVU Go as a browser source (1920x1080).
const API='https://ftgioo-su2026-api-production.up.railway.app';
const Q=new URLSearchParams(location.search);
const SCENE=(Q.get('id')||Q.get('scene')||'').toLowerCase().replace(/[^a-z0-9_]/g,'');
function suk(){ var k=Math.min(innerWidth/1920, innerHeight/1080); document.documentElement.style.setProperty('--suk',k); }
suk(); addEventListener('resize',suk); addEventListener('orientationchange',suk);

let ovCfg=null, suLastHtml, suLastJs, suLastReload;
function suLiveCss(){
  var cf=ovCfg||{};
  var s=document.getElementById('su-livecss'); if(!s){s=document.createElement('style');s.id='su-livecss';document.head.appendChild(s);}
  s.textContent=(typeof cf.css==='string')?cf.css:'';
  var cu=document.getElementById('su-custom');
  var html=(typeof cf.html==='string')?cf.html:'';
  if(cu&&html!==suLastHtml){ suLastHtml=html; cu.innerHTML=html; }
  var js=(typeof cf.js==='string')?cf.js:'';
  if(js!==suLastJs){ suLastJs=js; if(js){ try{ (new Function('root','cfg',js))(cu,cf); }catch(e){ console.warn('scene JS error:',e&&e.message); } } }
}
function apply(){
  if(!ovCfg) return;
  suLiveCss();
  var st=document.getElementById('su-stage');
  st.style.visibility=ovCfg.hidden?'hidden':'';
  var cu=document.getElementById('su-custom');
  var sc=(typeof ovCfg.scale==='number')?ovCfg.scale:1;
  var px=(typeof ovCfg.px==='number')?ovCfg.px:0, py=(typeof ovCfg.py==='number')?ovCfg.py:0;
  cu.style.transformOrigin='top left';
  cu.style.transform=((px||py)?('translate('+(px*19.2)+'px,'+(py*10.8)+'px) '):'')+(sc!==1?('scale('+sc+')'):'');
  var bg=document.getElementById('su-bg');
  bg.style.opacity=(typeof ovCfg.bgop==='number')?ovCfg.bgop:0;
  bg.style.background=(typeof ovCfg.bg==='string'&&ovCfg.bg)?ovCfg.bg:'linear-gradient(160deg,#6b1d29,#4e131d)';
}
function showEmpty(msg){
  var cu=document.getElementById('su-custom');
  if(!suLastHtml) cu.innerHTML='<div id="su-empty">'+msg+'</div>';
}
async function poll(){
  if(!SCENE){ showEmpty('Add <b>?id=YOUR_SCENE</b> to this URL. Create scenes in the hub → Overlays → New overlay.'); return; }
  try{
    const r=await fetch(API+'/api/overlay',{cache:'no-store'}); const j=await r.json();
    if(j.ok){
      ovCfg=(j.overlays&&j.overlays[SCENE])||{};
      if(ovCfg.reload!==undefined){ if(suLastReload===undefined){suLastReload=ovCfg.reload;} else if(ovCfg.reload!==suLastReload){location.reload();return;} }
      if(!ovCfg.css&&!ovCfg.html&&!ovCfg.js) showEmpty('Scene "<b>'+SCENE+'</b>" is empty. Build it live in the hub.');
      apply();
    }
  }catch(e){}
}
poll(); setInterval(poll,9000);
</script>
