<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FT.GIOO CANVAS</title>
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;width:100%;height:100%}
  /* The whole show is ONE 1920x1080 composite, scaled to fit whatever layer TVU
     gives us and always CENTERED, so a non 16:9 webview letterboxes instead of
     clipping to a corner. This is the single thing you add to TVU. */
  #cv-frame{position:fixed;top:0;left:0;width:1920px;height:1080px;
    transform-origin:top left;transform:scale(var(--cvkx,1),var(--cvky,1));
    will-change:transform}
  /* preview mode letterboxes a clean 16:9 centered, so it looks correct in a browser */
  #cv-frame.fit{top:50%;left:50%;transform-origin:center center;
    transform:translate(-50%,-50%) scale(var(--cvkx,1))}
  /* each widget is its own overlay page, running at a true 1920x1080 inside its frame */
  .cv-w{position:absolute;left:0;top:0;width:1920px;height:1080px;border:0;
    background:transparent;pointer-events:none;display:block;color-scheme:normal}
  /* one time full frame setup guide for the single canvas layer */
  #cv-align{position:fixed;inset:0;pointer-events:none;z-index:2147483000;display:none;
    border:6px solid #ffb320;box-sizing:border-box}
  #cv-align.on{display:block}
  #cv-align b{position:fixed;left:14px;top:14px;background:#0a0406e6;border:2px solid #ffb320;
    border-radius:11px;padding:9px 14px;font:800 15px/1.3 Archivo,-apple-system,Segoe UI,sans-serif;
    color:#fff;max-width:80vw;text-shadow:0 1px 2px #000}
  #cv-align i{position:absolute;width:44px;height:44px;background:#ffb320}
</style>
</head>
<body>
<div id="cv-frame"></div>
<div id="cv-align">
  <i style="top:-6px;left:-6px"></i><i style="top:-6px;right:-6px"></i>
  <i style="bottom:-6px;left:-6px"></i><i style="bottom:-6px;right:-6px"></i>
  <b>FTGIOO CANVAS. Stretch this layer in TVU until this gold border touches all 4 screen edges, then lock it.</b>
</div>
<script>
const Q=new URLSearchParams(location.search);
const API=(location.origin && location.origin.indexOf('http')===0)
  ? location.origin
  : 'https://ftgioo-su2026-api-production.up.railway.app';

// Built in overlays map to their existing standalone pages, loaded as internal
// frames, with a sensible default stacking order (alerts sit on top).
const BUILTINS={
  campus:{src:'/campus', z:20},
  socials:{src:'/socials', z:30},
  subs:{src:'/subs',    z:40},
  alerts:{src:'/alerts', z:80}
};

// Pass through params (socials handles, channel, etc.) reach every widget frame.
const PASS=(location.search||'').replace(/^\?/,'');

const frame=document.getElementById('cv-frame');
const align=document.getElementById('cv-align');
const frames={}; // name -> iframe element

// Stretch the 1920x1080 composite to FILL the exact webview TVU gives us (non-uniform).
// TVU then maps that webview onto the 16:9 broadcast, so filling here cancels the
// side/letterbox bars that were showing up as a margin on stream when the phone's
// webview was not exactly 16:9. The per-overlay editor stays a clean 16:9 = the final look.
var PREVIEW=Q.get('preview')==='1';
function suk(){
  var kx=(innerWidth||1920)/1920, ky=(innerHeight||1080)/1080;
  if(!isFinite(kx)||kx<=0) kx=1;
  if(!isFinite(ky)||ky<=0) ky=1;
  if(PREVIEW){ kx=ky=Math.min(kx,ky); } // preview: uniform letterbox so a browser looks right
  document.documentElement.style.setProperty('--cvkx', kx);
  document.documentElement.style.setProperty('--cvky', ky);
}
if(PREVIEW) frame.classList.add('fit');
suk(); addEventListener('resize',suk); addEventListener('orientationchange',suk);

// Optional true 1:1 preview: her live Twitch feed as the backdrop, so you see the
// overlays exactly as they sit on the real broadcast. Opened from the hub.
if(Q.get('preview')==='1'){
  var _host=location.hostname||'ftgioo.live';
  var _tw=document.createElement('iframe');
  _tw.className='cv-w'; _tw.style.zIndex='0'; _tw.allow='autoplay';
  _tw.src='https://player.twitch.tv/?channel='+(Q.get('channel')||'ftgioo')+'&parent='+_host+'&muted=true&autoplay=true&controls=false';
  frame.appendChild(_tw);
}

function widgetSrc(name, cv){
  var base=BUILTINS[name]?BUILTINS[name].src:('/scene?id='+encodeURIComponent(name));
  var p=new URLSearchParams();
  p.set('canvas','1'); // tells the overlay it is embedded in the canvas
  // pass through any params on the canvas URL itself
  if(PASS){ new URLSearchParams(PASS).forEach(function(v,k){ p.set(k,v); }); }
  // inject socials handles from server config (so the canvas URL stays clean and
  // handles stay editable live from the hub) for the widgets that show them
  if((name==='socials'||name==='campus') && cv && cv.handles){
    ['ig','x','yt','tt','tw','channel'].forEach(function(k){ if(cv.handles[k]) p.set(k, cv.handles[k]); });
  }
  return base+(base.indexOf('?')>=0?'&':'?')+p.toString();
}

// Add, remove, restack, or refresh frames to match the live overlay set.
function reconcile(ov){
  ov=ov||{};
  var cv=ov.canvas||{};
  var want={};
  // builtins are present unless explicitly hidden
  Object.keys(BUILTINS).forEach(function(name){
    var c=ov[name]||{}; if(!c.hidden) want[name]=c;
  });
  // custom scenes: only real builder scenes, not leftover/legacy config keys
  Object.keys(ov).forEach(function(name){
    if(BUILTINS[name]||name==='canvas'||name==='classcard') return;
    var c=ov[name]||{};
    if(c.hidden||c.onCanvas===false) return;
    var isScene=(c.onCanvas===true)||(typeof c.sceneTitle==='string')||
      (typeof c.css==='string'&&c.css)||(typeof c.html==='string'&&c.html)||(typeof c.js==='string'&&c.js);
    if(!isScene) return;
    want[name]=c;
  });
  // drop frames no longer wanted (frees their chat sockets, timers, etc.)
  Object.keys(frames).forEach(function(name){
    if(!(name in want)){ try{frames[name].remove();}catch(e){} delete frames[name]; }
  });
  // add, restack, or refresh the wanted frames
  Object.keys(want).forEach(function(name){
    var c=want[name], f=frames[name], src=widgetSrc(name, cv);
    if(!f){
      f=document.createElement('iframe');
      f.className='cv-w';
      f.setAttribute('scrolling','no');
      f.setAttribute('allowtransparency','true');
      f.allow='autoplay';
      f.dataset.src=src; f.src=src;
      frame.appendChild(f);
      frames[name]=f;
    } else if(f.dataset.src!==src){ // handles/params changed -> reload just this frame
      f.dataset.src=src; f.src=src;
    }
    var z=(typeof c.z==='number')?c.z:(BUILTINS[name]?BUILTINS[name].z:50);
    f.style.zIndex=z;
  });
}

var lastReload;
async function poll(){
  try{
    var r=await fetch(API+'/api/overlay',{cache:'no-store'});
    var j=await r.json();
    if(j&&j.ok){
      var ov=j.overlays||{};
      var cv=ov.canvas||{};
      // hub can reload the whole canvas at once
      if(cv.reload!==undefined){
        if(lastReload===undefined) lastReload=cv.reload;
        else if(cv.reload!==lastReload){ location.reload(); return; }
      }
      align.classList.toggle('on', !!cv.calib);
      reconcile(ov);
    }
  }catch(e){}
}
poll(); setInterval(poll,6000);
</script>
</body>
</html>
