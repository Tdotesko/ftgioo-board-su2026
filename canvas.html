<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FT.GIOO CANVAS</title>
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;width:100%;height:100%}
  /* The whole show is ONE 1920x1080 composite, scaled to fit whatever layer TVU
     gives us and always CENTERED, so a non 16:9 webview letterboxes instead of
     clipping to a corner. This is the single thing you add to TVU. */
  #cv-frame{position:fixed;top:0;left:0;width:1920px;height:1080px;
    transform-origin:top left;transform:scale(var(--cvkx,1),var(--cvky,1));
    will-change:transform}
  /* preview mode letterboxes a clean 16:9 centered, so it looks correct in a browser */
  #cv-frame.fit{top:50%;left:50%;transform-origin:center center;
    transform:translate(-50%,-50%) scale(var(--cvkx,1))}
  /* each widget is its own overlay page, running at a true 1920x1080 inside its frame */
  .cv-w{position:absolute;left:0;top:0;width:1920px;height:1080px;border:0;
    background:transparent;pointer-events:none;display:block;color-scheme:normal}
  /* one time full frame setup guide for the single canvas layer */
  #cv-align{position:fixed;inset:0;pointer-events:none;z-index:2147483000;display:none;
    border:6px solid #ffb320;box-sizing:border-box}
  #cv-align.on{display:block}
  #cv-align b{position:fixed;left:14px;top:14px;background:#0a0406e6;border:2px solid #ffb320;
    border-radius:11px;padding:9px 14px;font:800 15px/1.3 Archivo,-apple-system,Segoe UI,sans-serif;
    color:#fff;max-width:80vw;text-shadow:0 1px 2px #000}
  #cv-align i{position:absolute;width:44px;height:44px;background:#ffb320}
  /* unified layout editor */
  #cv-etb{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:2147483001;display:flex;gap:8px;align-items:center;
    background:#1b1016;border:2px solid #c23a1f;border-radius:12px;padding:8px 13px;font:700 12px Inter,-apple-system,sans-serif;color:#ece8dd;box-shadow:4px 4px 0 #000;max-width:96vw;flex-wrap:wrap;justify-content:center}
  #cv-etb b{font-family:'Baloo 2',sans-serif;text-transform:uppercase;color:#f2c53d;font-size:12px}
  #cv-etb button{font-family:'Baloo 2',sans-serif;font-weight:800;text-transform:uppercase;font-size:11.5px;border:2px solid #c23a1f;background:#c23a1f;color:#fff;border-radius:16px;padding:6px 13px;cursor:pointer}
  .cv-h{position:absolute;border:2px dashed #f2c53d;background:rgba(242,197,61,.05);cursor:move;z-index:2147482000;box-sizing:border-box;touch-action:none}
  .cv-h .cv-lb{position:absolute;top:-20px;left:-2px;background:#c23a1f;color:#fff;font:800 10px/1 'Baloo 2',sans-serif;text-transform:uppercase;padding:3px 7px;border-radius:6px;white-space:nowrap;pointer-events:none}
  .cv-h .cv-grip{position:absolute;right:-9px;bottom:-9px;width:20px;height:20px;background:#f2c53d;border:2px solid #000;border-radius:3px;cursor:nwse-resize}
</style>
</head>
<body>
<div id="cv-frame"></div>
<div id="cv-align">
  <i style="top:-6px;left:-6px"></i><i style="top:-6px;right:-6px"></i>
  <i style="bottom:-6px;left:-6px"></i><i style="bottom:-6px;right:-6px"></i>
  <b>FTGIOO CANVAS. Stretch this layer in TVU until this gold border touches all 4 screen edges, then lock it.</b>
</div>
<script>
const Q=new URLSearchParams(location.search);
const API=(location.origin && location.origin.indexOf('http')===0)
  ? location.origin
  : 'https://ftgioo-su2026-api-production.up.railway.app';

// Built in overlays map to their existing standalone pages, loaded as internal
// frames, with a sensible default stacking order (alerts sit on top).
const BUILTINS={
  campus:{src:'/campus', z:20},
  socials:{src:'/socials', z:30},
  chat:{src:'/chat',    z:35},
  subs:{src:'/subs',    z:40},
  alerts:{src:'/alerts', z:80}
};

// Pass through params (socials handles, channel, etc.) reach every widget frame.
const PASS=(location.search||'').replace(/^\?/,'');

const frame=document.getElementById('cv-frame');
const align=document.getElementById('cv-align');
const frames={}; // name -> iframe element

// Stretch the 1920x1080 composite to FILL the exact webview TVU gives us (non-uniform).
// TVU then maps that webview onto the 16:9 broadcast, so filling here cancels the
// side/letterbox bars that were showing up as a margin on stream when the phone's
// webview was not exactly 16:9. The per-overlay editor stays a clean 16:9 = the final look.
var PREVIEW=Q.get('preview')==='1';
var EDITMODE=Q.get('edit')==='1';
var FIT=PREVIEW||EDITMODE;
function suk(){
  var kx=(innerWidth||1920)/1920, ky=(innerHeight||1080)/1080;
  if(!isFinite(kx)||kx<=0) kx=1;
  if(!isFinite(ky)||ky<=0) ky=1;
  if(FIT){ kx=ky=Math.min(kx,ky); } // preview/edit: uniform letterbox so a browser looks right
  document.documentElement.style.setProperty('--cvkx', kx);
  document.documentElement.style.setProperty('--cvky', ky);
}
if(FIT) frame.classList.add('fit');
var lastOv={};
suk(); addEventListener('resize',suk); addEventListener('orientationchange',suk);

// Optional true 1:1 preview: her live Twitch feed as the backdrop, so you see the
// overlays exactly as they sit on the real broadcast. Opened from the hub.
if(Q.get('preview')==='1'){
  var _host=location.hostname||'ftgioo.live';
  var _tw=document.createElement('iframe');
  _tw.className='cv-w'; _tw.style.zIndex='0'; _tw.allow='autoplay';
  _tw.src='https://player.twitch.tv/?channel='+(Q.get('channel')||'ftgioo')+'&parent='+_host+'&muted=true&autoplay=true&controls=false';
  frame.appendChild(_tw);
}

function widgetSrc(name, cv, c){
  // chat widget can point at an external overlay (e.g. UChat) via its cfg.src
  if(name==='chat' && c && typeof c.src==='string' && /^https?:\/\//i.test(c.src)) return c.src;
  var base=BUILTINS[name]?BUILTINS[name].src:('/scene?id='+encodeURIComponent(name));
  var p=new URLSearchParams();
  p.set('canvas','1'); // tells the overlay it is embedded in the canvas
  // pass through any params on the canvas URL itself
  if(PASS){ new URLSearchParams(PASS).forEach(function(v,k){ p.set(k,v); }); }
  // inject socials handles from server config (so the canvas URL stays clean and
  // handles stay editable live from the hub) for the widgets that show them
  if((name==='socials'||name==='campus') && cv && cv.handles){
    ['ig','x','yt','tt','tw','channel'].forEach(function(k){ if(cv.handles[k]) p.set(k, cv.handles[k]); });
  }
  return base+(base.indexOf('?')>=0?'&':'?')+p.toString();
}

// Add, remove, restack, or refresh frames to match the live overlay set.
function reconcile(ov){
  ov=ov||{};
  var cv=ov.canvas||{};
  var want={};
  // builtins are present unless explicitly hidden
  Object.keys(BUILTINS).forEach(function(name){
    var c=ov[name]||{}; if(!c.hidden) want[name]=c;
  });
  // custom scenes: only real builder scenes, not leftover/legacy config keys
  Object.keys(ov).forEach(function(name){
    if(BUILTINS[name]||name==='canvas'||name==='classcard') return;
    var c=ov[name]||{};
    if(c.hidden||c.onCanvas===false) return;
    var isScene=(c.onCanvas===true)||(typeof c.sceneTitle==='string')||
      (typeof c.css==='string'&&c.css)||(typeof c.html==='string'&&c.html)||(typeof c.js==='string'&&c.js);
    if(!isScene) return;
    want[name]=c;
  });
  // drop frames no longer wanted (frees their chat sockets, timers, etc.)
  Object.keys(frames).forEach(function(name){
    if(!(name in want)){ try{frames[name].remove();}catch(e){} delete frames[name]; }
  });
  // add, restack, or refresh the wanted frames
  Object.keys(want).forEach(function(name){
    var c=want[name], f=frames[name], src=widgetSrc(name, cv, c);
    if(!f){
      f=document.createElement('iframe');
      f.className='cv-w';
      f.setAttribute('scrolling','no');
      f.setAttribute('allowtransparency','true');
      f.allow='autoplay';
      f.dataset.src=src; f.src=src;
      frame.appendChild(f);
      frames[name]=f;
    } else if(f.dataset.src!==src){ // handles/params changed -> reload just this frame
      f.dataset.src=src; f.src=src;
    }
    var z=(typeof c.z==='number')?c.z:(BUILTINS[name]?BUILTINS[name].z:50);
    f.style.zIndex=z;
    // the chat widget can be moved/resized as a box on the canvas (UChat fills it)
    if(name==='chat'){
      var px=(typeof c.px==='number')?c.px:0, py=(typeof c.py==='number')?c.py:0;
      var w=(typeof c.w==='number')?c.w:1920, h=(typeof c.h==='number')?c.h:1080;
      f.style.left=(px/100*1920)+'px'; f.style.top=(py/100*1080)+'px'; f.style.width=w+'px'; f.style.height=h+'px';
    }
  });
}

var lastReload;
async function poll(){
  try{
    var r=await fetch(API+'/api/overlay',{cache:'no-store'});
    var j=await r.json();
    if(j&&j.ok){
      var ov=j.overlays||{}; lastOv=ov;
      var cv=ov.canvas||{};
      // hub can reload the whole canvas at once
      if(cv.reload!==undefined){
        if(lastReload===undefined) lastReload=cv.reload;
        else if(cv.reload!==lastReload){ location.reload(); return; }
      }
      align.classList.toggle('on', !!cv.calib);
      reconcile(ov);
    }
  }catch(e){}
}
poll(); setInterval(poll,6000);

// ===== unified layout editor (?edit=1): move/resize every overlay at once =====
if(EDITMODE){
  document.title='FT.GIOO Canvas - Layout editor';
  var CE={ alerts:{sel:'#alert',anchor:'center'}, subs:{sel:'#card',anchor:'topleft'}, campus:{sel:'#card',anchor:'topleft'}, socials:{sel:'#bar',anchor:'topleft'} };
  var handles={};
  function tkn(){ try{ return (JSON.parse(localStorage.getItem('su_hub_sess')||'{}').token)||''; }catch(e){ return ''; } }
  function emsg(m){ var e=document.getElementById('cv-emsg'); if(e){ e.textContent=m; clearTimeout(e._t); e._t=setTimeout(function(){ e.textContent='drag any piece, corner to resize'; },1600); } }
  function save(name,cfg){ var t=tkn(); if(!t){ emsg('Log in at the hub first'); return; } fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t,name:name,cfg:cfg})}).then(function(r){return r.json();}).then(function(j){ emsg(j.ok?('Saved '+name):'Save error'); }).catch(function(){ emsg('Save error'); }); }
  var tb=document.createElement('div'); tb.id='cv-etb';
  tb.innerHTML='<b>Layout editor</b><span id="cv-emsg" style="color:#ffd6a0;min-width:150px;text-align:center">drag any piece, corner to resize</span>';
  var done=document.createElement('button'); done.textContent='Done'; done.onclick=function(){ location.href='/hub'; }; tb.appendChild(done);
  document.body.appendChild(tb);
  function fscale(){ var r=frame.getBoundingClientRect(); return (r.width/1920)||1; }
  function contentEl(name){ var f=frames[name]; if(!f) return null; try{ var d=f.contentDocument; return d?d.querySelector(CE[name].sel):null; }catch(e){ return null; } }
  function ensureHandle(name){ var h=handles[name]; if(!h){ h=document.createElement('div'); h.className='cv-h'; h.innerHTML='<span class="cv-lb">'+name+'</span><div class="cv-grip"></div>'; frame.appendChild(h); handles[name]=h; wire(name,h); } return h; }
  function put(h,l,t,w,ht){ h.style.left=l+'px'; h.style.top=t+'px'; h.style.width=w+'px'; h.style.height=ht+'px'; }
  function layout(){
    Object.keys(CE).forEach(function(name){
      var el=contentEl(name), h=handles[name];
      if(!el){ if(h) h.style.display='none'; return; }
      h=ensureHandle(name); if(h.dataset.busy) return; h.style.display='block';
      var r=el.getBoundingClientRect(); put(h, r.left, r.top, r.width, r.height);
    });
    if(frames.chat){ var hc=ensureHandle('chat'); hc.style.display='block'; if(!hc.dataset.busy){ var c=lastOv.chat||{}; put(hc,(typeof c.px==='number'?c.px:0)/100*1920,(typeof c.py==='number'?c.py:0)/100*1080,(typeof c.w==='number'?c.w:1920),(typeof c.h==='number'?c.h:1080)); } }
  }
  setInterval(layout, 700);
  function applyMove(name,l,t,w,ht){
    if(name==='chat'){ var f=frames.chat; if(f){ f.style.left=l+'px'; f.style.top=t+'px'; } return; }
    var el=contentEl(name); if(!el) return;
    if(CE[name].anchor==='center'){ el.style.left=((l+w/2)/1920*100)+'%'; el.style.top=((t+ht/2)/1080*100)+'%'; }
    else { el.style.left=(l/1920*100)+'%'; el.style.top=(t/1080*100)+'%'; el.style.transformOrigin='top left'; el.style.right=''; el.style.bottom=''; }
  }
  function applyResize(name,w,ht){
    if(name==='chat'){ var f=frames.chat; if(f){ f.style.width=w+'px'; f.style.height=ht+'px'; } return; }
    var el=contentEl(name); if(!el) return; var base=el.offsetWidth||w; var sc=w/base;
    el.style.transform=(CE[name].anchor==='center'?'translate(-50%,-50%) ':'')+'scale('+sc.toFixed(3)+')'; el.dataset.osc=sc.toFixed(3);
  }
  function commit(name,h){
    var l=parseFloat(h.style.left),t=parseFloat(h.style.top),w=parseFloat(h.style.width),ht=parseFloat(h.style.height);
    if(name==='chat'){ save('chat',{px:+(l/1920*100).toFixed(2),py:+(t/1080*100).toFixed(2),w:Math.round(w),h:Math.round(ht)}); return; }
    var el=contentEl(name), cfg={};
    if(CE[name].anchor==='center'){ cfg.px=+((l+w/2)/1920*100).toFixed(2); cfg.py=+((t+ht/2)/1080*100).toFixed(2); }
    else { cfg.px=+(l/1920*100).toFixed(2); cfg.py=+(t/1080*100).toFixed(2); }
    if(el&&el.dataset.osc) cfg.scale=parseFloat(el.dataset.osc);
    save(name,cfg);
  }
  function wire(name,h){
    var grip=h.querySelector('.cv-grip');
    h.addEventListener('pointerdown',function(e){ if(e.target===grip) return; h.dataset.busy='1'; var sc=fscale(),sx=e.clientX,sy=e.clientY,l0=parseFloat(h.style.left),t0=parseFloat(h.style.top); h.setPointerCapture(e.pointerId);
      function mv(ev){ var nl=l0+(ev.clientX-sx)/sc, nt=t0+(ev.clientY-sy)/sc; h.style.left=nl+'px'; h.style.top=nt+'px'; applyMove(name,nl,nt,parseFloat(h.style.width),parseFloat(h.style.height)); }
      function up(){ h.removeEventListener('pointermove',mv); h.removeEventListener('pointerup',up); delete h.dataset.busy; commit(name,h); }
      h.addEventListener('pointermove',mv); h.addEventListener('pointerup',up); e.preventDefault();
    });
    grip.addEventListener('pointerdown',function(e){ h.dataset.busy='1'; var sc=fscale(),sx=e.clientX,sy=e.clientY,w0=parseFloat(h.style.width),h0=parseFloat(h.style.height); grip.setPointerCapture(e.pointerId);
      function mv(ev){ var nw=Math.max(60,w0+(ev.clientX-sx)/sc), nh=Math.max(40,h0+(ev.clientY-sy)/sc); h.style.width=nw+'px'; h.style.height=nh+'px'; applyResize(name,nw,nh); }
      function up(){ grip.removeEventListener('pointermove',mv); grip.removeEventListener('pointerup',up); delete h.dataset.busy; commit(name,h); }
      grip.addEventListener('pointermove',mv); grip.addEventListener('pointerup',up); e.stopPropagation(); e.preventDefault();
    });
  }
}
</script>
</body>
</html>
