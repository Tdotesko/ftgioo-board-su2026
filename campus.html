<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SU2026 Campus Feed</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#6b1d29; --maroon-deep:#4e131d;
    --gold:#ffb320; --gold-soft:#ffc95e; --red:#c31f2f; --red-deep:#8f1622;
    --cream:#f6e7c9; --cream-dim:#dcc9a4;
  }
  html,body{margin:0;padding:0;background:transparent;overflow:hidden}
  body{font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}

  #card{
    display:flex;align-items:center;gap:16px;
    min-width:560px;max-width:940px;
    position:fixed;top:14px;left:14px;
    background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-deep) 100%);
    border:3px solid var(--gold);
    box-shadow:0 14px 40px -8px rgba(0,0,0,.6),
               inset 0 0 0 3px var(--maroon-deep),
               inset 0 0 0 5px var(--red);
    border-radius:18px;
    padding:13px 22px 12px 16px;color:var(--cream);
    transition:opacity .4s;
  }
  #card.hide{opacity:0}
  .crest{width:96px;height:96px;flex-shrink:0;object-fit:contain;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
  .cwrap{flex:1;min-width:0}
  .eyebrow{font-family:'Graduate',serif;font-size:12.5px;letter-spacing:2.5px;
    color:var(--gold);display:flex;align-items:center;gap:9px;
    text-shadow:1px 1px 0 var(--red-deep)}
  .eyebrow .star{color:var(--red);text-shadow:none;font-size:10px}
  .eyebrow .yr{color:var(--cream-dim);letter-spacing:1.5px}
  #clock{margin-left:auto;font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;
    color:var(--cream-dim);letter-spacing:.5px;text-shadow:none;font-variant-numeric:tabular-nums}
  .mainrow{display:flex;align-items:center;gap:13px;margin-top:8px;flex-wrap:wrap}
  .pill{flex-shrink:0;font-family:'Graduate',serif;font-size:11.5px;letter-spacing:1.4px;
    padding:6px 12px 5px;border-radius:8px;display:flex;align-items:center;gap:7px;
    text-transform:uppercase}
  .pill .d{width:8px;height:8px;border-radius:50%}
  .pill.live{background:var(--gold);color:var(--maroon-deep);box-shadow:0 2px 0 var(--red-deep)}
  .pill.live .d{background:var(--red);animation:pulse 1.4s ease-in-out infinite}
  .pill.break,.pill.soon{background:transparent;color:var(--gold);border:2px solid var(--gold)}
  .pill.break .d,.pill.soon .d{background:var(--gold)}
  .pill.soon .d{animation:pulse 1.4s ease-in-out infinite}
  .pill.done{background:transparent;color:var(--cream-dim);border:2px solid var(--cream-dim)}
  .pill.done .d{background:var(--cream-dim)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  #title{font-family:'Graduate',serif;font-size:29px;line-height:1.1;color:var(--gold);
    text-shadow:2px 2px 0 var(--red-deep),3px 3px 0 rgba(0,0,0,.35)}
  .inforow{display:flex;align-items:center;gap:14px;margin-top:10px;padding-top:10px;
    border-top:2px solid rgba(255,179,32,.3);min-height:26px}
  #slot{flex:1;min-width:0;font-weight:700;font-size:15px;color:var(--cream-dim);
    display:flex;align-items:center;gap:9px;opacity:1;transition:opacity .45s;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #slot.fade{opacity:0}
  #slot b{color:var(--cream)}
  #slot .g{color:var(--gold)}
  #slot svg{width:16px;height:16px;fill:var(--gold);flex-shrink:0}
  #slot .mini{display:inline-block;width:90px;height:9px;border-radius:5px;
    background:var(--maroon-deep);border:1px solid var(--red);overflow:hidden;vertical-align:middle}
  #slot .minif{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft))}
  #slot .chk{color:var(--gold)} #slot .cur{color:#fff}
  .cd{flex-shrink:0;text-align:right}
  .cd .l{font-family:'Graduate',serif;font-size:10px;letter-spacing:2px;color:var(--gold);
    text-transform:uppercase}
  .cd .t{font-weight:800;font-size:19px;color:var(--gold-soft);font-variant-numeric:tabular-nums}
  .cd .t.hot{color:#fff;animation:pulse 1.2s ease-in-out infinite}
  #card.bigcd .cd .t{font-size:26px}

  /* class-start takeover */
  #takeover{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);
    opacity:0;pointer-events:none;text-align:center;
    background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-deep) 100%);
    border:4px solid var(--gold);border-radius:24px;
    box-shadow:0 30px 80px -10px rgba(0,0,0,.75),
               inset 0 0 0 4px var(--maroon-deep),inset 0 0 0 7px var(--red);
    padding:30px 56px;transition:opacity .5s,transform .5s cubic-bezier(.2,1.4,.4,1)}
  #takeover.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #takeover img{width:130px;height:130px;object-fit:contain;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.45))}
  #takeover .tk1{font-family:'Graduate',serif;font-size:17px;letter-spacing:4px;color:var(--cream);
    margin-top:10px;text-transform:uppercase}
  #takeover .tk2{font-family:'Graduate',serif;font-size:44px;color:var(--gold);margin-top:8px;
    text-shadow:3px 3px 0 var(--red-deep),4px 4px 0 rgba(0,0,0,.35);line-height:1.1}
  #takeover .tk3{font-weight:800;font-size:20px;color:var(--cream-dim);margin-top:10px}
  #takeover .tk3 b{color:var(--cream)}
</style>
</head>
<body>
<div id="card" class="hide">
  <img class="crest" src="crest.png" alt="">
  <div class="cwrap">
    <div class="eyebrow">Streamer University <span class="star">★</span> <span class="yr">2026 · FTGIOO</span><span id="clock"></span></div>
    <div class="mainrow">
      <span id="pill" class="pill live"><span class="d"></span><span id="pilltext">In class</span></span>
      <span id="title">Loading…</span>
    </div>
    <div class="inforow">
      <div id="slot"></div>
      <div class="cd" id="cd"><div class="l" id="cdl">Next class</div><div class="t" id="cdt"></div></div>
    </div>
  </div>
</div>

<div id="takeover">
  <img src="crest.png" alt="">
  <div class="tk1">🔔 Class Now Starting</div>
  <div class="tk2" id="tk-title"></div>
  <div class="tk3" id="tk-prof"></div>
</div>

<script>
const Q=new URLSearchParams(location.search);
const API=Q.get('api')||'https://ftgioo-su2026-api-production.up.railway.app';
const SOCIALS={tw:Q.get('tw')||'ftgioo', yt:Q.get('yt')||'ftgioo', ig:Q.get('ig')||'ft.gioo', x:Q.get('x')||'sosaisbacc'};
const SOUND=Q.get('sound')!=='0';
const ICONS={
  tw:'M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z',
  yt:'M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z M9.545 15.568V8.432L15.818 12l-6.273 3.568z',
  ig:'M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.015 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.015 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.015-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 1 0 0-12.324zM12 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm7.846-10.405a1.441 1.441 0 0 1-2.88 0 1.44 1.44 0 0 1 2.88 0z',
  x:'M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z'
};

let SCHED=null, eff=null, marks={}, subs=null, target=null, lastEffKey=null, booted=false;
const $=id=>document.getElementById(id);
const isClass=s=>!!(s&&s.current&&s.current.indexOf('🔔')===0);
function profOf(sec){const m=(sec&&sec.professor||'').match(/Now teaching:\s*([^(]+?)\s*\(/);return m?m[1].trim():'';}
function followOf(sec){const m=(sec&&sec.current||'').match(/(?:Follow|follow):\s*(\S+)/);return m?m[1]:'';}
function fmtTime(min){let h=Math.floor(min/60),m=min%60,ap=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;
  return h+(m?(':'+String(m).padStart(2,'0')):':00')+' '+ap;}
function nextClassAfter(dayId,si){
  const di=SCHED.days.findIndex(d=>d.id===dayId); if(di<0)return null;
  for(let i=si+1;i<SCHED.days[di].sections.length;i++){const s=SCHED.days[di].sections[i];
    if(isClass(s))return{date:SCHED.days[di].date,min:s.min,label:s.label,prof:profOf(s)};}
  for(let d=di+1;d<SCHED.days.length;d++)for(const s of SCHED.days[d].sections)
    if(isClass(s))return{date:SCHED.days[d].date,min:s.min,label:s.label,prof:profOf(s)};
  return null;
}
function ctNowSec(){
  const f=new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',
    day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const o={}; f.formatToParts(new Date()).forEach(p=>o[p.type]=p.value);
  let h=parseInt(o.hour,10); if(h===24)h=0;
  return (+o.day)*86400+h*3600+(+o.minute)*60+(+o.second);
}
function ctClockStr(){
  return new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',
    hour:'numeric',minute:'2-digit',hour12:true}).format(new Date())+' CT';
}
function chime(){
  if(!SOUND) return;
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)(); const now=a.currentTime;
    [[880,0],[1174.7,0.22]].forEach(pair=>{
      const o=a.createOscillator(),g=a.createGain();
      o.type='sine'; o.frequency.value=pair[0];
      o.connect(g); g.connect(a.destination);
      g.gain.setValueAtTime(0.0001,now+pair[1]);
      g.gain.exponentialRampToValueAtTime(0.22,now+pair[1]+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,now+pair[1]+1.4);
      o.start(now+pair[1]); o.stop(now+pair[1]+1.5);
    });
  }catch(e){}
}

/* ---------- rotating info slots ---------- */
let slotIdx=0;
function buildSlots(sec,nxt,mode){
  const slots=[];
  if(mode==='class'){
    const p=profOf(sec), f=followOf(sec);
    slots.push('👨‍🏫 Professor · <b>'+p+'</b>'+(f?(' — follow: <span class="g">'+f+'</span>'):''));
  }else if(nxt){
    slots.push('👨‍🏫 Up next professor · <b>'+nxt.prof+'</b>');
  }
  if(subs&&typeof subs.count==='number'){
    let s='💛 <b>'+subs.count.toLocaleString()+'</b> subs';
    if(subs.goal){const pct=Math.min(100,subs.count/subs.goal*100);
      s+=' <span class="mini"><span class="minif" style="width:'+pct.toFixed(0)+'%"></span></span> goal <b>'+subs.goal.toLocaleString()+'</b>';}
    slots.push(s);
  }
  slots.push(
    '<svg viewBox="0 0 24 24"><path d="'+ICONS.tw+'"/></svg>@'+SOCIALS.tw+
    ' <svg viewBox="0 0 24 24"><path d="'+ICONS.yt+'"/></svg>@'+SOCIALS.yt+
    ' <svg viewBox="0 0 24 24"><path d="'+ICONS.ig+'"/></svg>@'+SOCIALS.ig+
    ' <svg viewBox="0 0 24 24"><path d="'+ICONS.x+'"/></svg>@'+SOCIALS.x
  );
  if(eff){
    const day=SCHED.days.find(d=>d.id===eff.day);
    if(day){
      const bits=[];
      day.sections.forEach((s,i)=>{
        if(!isClass(s)) return;
        const done=marks[eff.day+':'+i], cur=i===eff.section;
        bits.push((cur?'<span class="cur">● ':'')+s.short.replace(/^\S+\s/,'')+(cur?'</span>':(done?' <span class="chk">✓</span>':'')));
      });
      if(bits.length) slots.push('📋 Today: '+bits.join(' · '));
    }
  }
  return slots;
}
let curSlots=[];
function rotateSlot(){
  if(!curSlots.length) return;
  const el=$('slot');
  el.classList.add('fade');
  setTimeout(()=>{
    slotIdx=(slotIdx+1)%curSlots.length;
    el.innerHTML=curSlots[slotIdx];
    el.classList.remove('fade');
  },460);
}
setInterval(rotateSlot,8000);

/* ---------- render ---------- */
function render(){
  if(!SCHED||!eff) return;
  const day=SCHED.days.find(d=>d.id===eff.day); if(!day) return;
  const sec=day.sections[Math.min(eff.section,day.sections.length-1)];
  const nxt=nextClassAfter(eff.day,eff.section);
  target=nxt?{abs:nxt.date*86400+nxt.min*60}:null;

  const inClass=isClass(sec);
  const isSetup=sec.label&&sec.label.toLowerCase().indexOf('setup')>=0;
  const isEnd=sec.label&&/wrap|graduation/i.test(sec.label);
  const mode=inClass?'class':(nxt?(isSetup?'soon':(isEnd?'end':'break')):'grad');

  const pill=$('pill'),pt=$('pilltext'),title=$('title'),card=$('card');
  if(mode==='class'){
    pill.className='pill live'; pt.textContent='In class';
    title.textContent=sec.label; card.classList.remove('bigcd');
    $('cdl').textContent='Next class';
  }else if(mode==='grad'){
    pill.className='pill done'; pt.textContent='Semester complete';
    title.textContent='That’s a wrap! 🎓'; card.classList.remove('bigcd');
  }else{
    pill.className='pill '+(mode==='soon'?'soon':(mode==='end'?'done':'break'));
    pt.textContent=mode==='soon'?'Starting soon':(mode==='end'?'Done for today':'On break');
    title.textContent=mode==='end'?'Class dismissed! 🎓':nxt.label;
    card.classList.add('bigcd');
    $('cdl').textContent=mode==='end'?'Back in':(nxt?('Starts '+fmtTime(nxt.min)+' · in'):'');
  }
  $('cd').style.display=target?'':'none';

  curSlots=buildSlots(sec,nxt,mode);
  if(slotIdx>=curSlots.length) slotIdx=0;
  $('slot').innerHTML=curSlots[slotIdx]||'';

  // takeover on class start (only for changes observed while open)
  const key=eff.day+':'+eff.section;
  if(booted && key!==lastEffKey && inClass){
    $('tk-title').textContent=sec.label;
    const p=profOf(sec);
    $('tk-prof').innerHTML=p?('with Professor · <b>'+p+'</b>'):'';
    $('takeover').classList.add('show');
    chime();
    setTimeout(()=>$('takeover').classList.remove('show'),15000);
  }
  lastEffKey=key; booted=true;
  card.classList.remove('hide');
}
function tick(){
  $('clock').textContent=ctClockStr();
  const t=$('cdt');
  if(!target){t.textContent='';return;}
  const diff=target.abs-ctNowSec();
  if(diff<=0){t.textContent='NOW';t.className='t hot';return;}
  const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
  t.textContent=(h?h+':'+String(m).padStart(2,'0'):m)+':'+String(s).padStart(2,'0');
  t.className='t'+(diff<300?' hot':'');
}
async function poll(){
  try{
    const r=await fetch(API+'/api/state',{cache:'no-store'});
    const j=await r.json();
    if(j.ok){ eff=j.effective; marks=j.marks||{}; subs=j.subs||null; render(); }
  }catch(e){/* keep last */}
}
async function boot(){
  for(let i=0;i<20&&!SCHED;i++){
    try{const r=await fetch(API+'/api/schedule',{cache:'no-store'});SCHED=await r.json();}
    catch(e){await new Promise(res=>setTimeout(res,3000));}
  }
  await poll();
  setInterval(poll,10000);
  setInterval(tick,500);
}
boot();

/* ---------- position params + drag/resize editor ---------- */
(function(){
  const el=$('card');
  const bg=Q.get('bg');
  if(bg) document.body.style.background=/^[0-9a-fA-F]{6}$/.test(bg)?('#'+bg):bg;
  const pos=(Q.get('pos')||'tl').toLowerCase();
  let s=parseFloat(Q.get('scale')||'1')||1;
  const off='14px';
  const P={tl:{top:off,left:off,o:'top left'},tr:{top:off,right:off,o:'top right'},
           bl:{bottom:off,left:off,o:'bottom left'},br:{bottom:off,right:off,o:'bottom right'},
           bc:{bottom:off,left:'50%',o:'bottom center',x:true},tc:{top:off,left:'50%',o:'top center',x:true}};
  const p=P[pos]||P.tl;
  el.style.top=el.style.left=el.style.right=el.style.bottom='';
  ['top','left','right','bottom'].forEach(k=>{if(p[k])el.style[k]=p[k];});
  el.style.transformOrigin=p.o;
  el.style.transform=(p.x?'translateX(-50%) ':'')+(s!==1?('scale('+s+')'):'');
  if(Q.has('px')||Q.has('py')){
    el.style.left=(parseFloat(Q.get('px'))||0)+'%';
    el.style.top=(parseFloat(Q.get('py'))||0)+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform=s!==1?('scale('+s+')'):'';
  }
  if(Q.get('edit')!=='1') return;
  const css=document.createElement('style');
  css.textContent='#edittb{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:6px;align-items:center;background:#1b1016;border:2px solid #ffb320;border-radius:10px;padding:8px 10px;font-family:Archivo,sans-serif;max-width:96vw;flex-wrap:wrap;justify-content:center}#edittb button{background:#ffb320;border:none;border-radius:6px;font-weight:800;font-size:15px;width:32px;height:32px;cursor:pointer}#edittb .cp{width:auto;padding:0 12px;font-size:12px}#edittb input{width:min(340px,50vw);font-size:11px;padding:7px;border-radius:6px;border:1px solid #7d2433;background:#2a161d;color:#f6e7c9}#edittb span{color:#ffb320;font-weight:800;font-size:13px;min-width:46px;text-align:center}';
  document.head.appendChild(css);
  const tb=document.createElement('div'); tb.id='edittb';
  tb.innerHTML='<button id="eMinus">−</button><span id="eScale"></span><button id="ePlus">+</button><input id="eUrl" readonly><button id="eCopy" class="cp">Copy URL</button>';
  document.body.appendChild(tb);
  el.style.cursor='move'; el.style.touchAction='none';
  function fixPos(){const r=el.getBoundingClientRect();
    el.style.left=r.left+'px'; el.style.top=r.top+'px';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform=s!==1?('scale('+s+')'):'';}
  function urlNow(){const q=new URLSearchParams(location.search);
    q.delete('edit');q.delete('pos');
    if(s!==1)q.set('scale',s.toFixed(2));else q.delete('scale');
    const r=el.getBoundingClientRect();
    q.set('px',(r.left/innerWidth*100).toFixed(2));
    q.set('py',(r.top/innerHeight*100).toFixed(2));
    return location.origin+location.pathname+'?'+q.toString();}
  function refresh(){$('eScale').textContent=s.toFixed(2)+'×';
    el.style.transform=s!==1?('scale('+s+')'):'';
    $('eUrl').value=urlNow();}
  $('ePlus').onclick=()=>{s=Math.min(3,s+0.05);refresh();};
  $('eMinus').onclick=()=>{s=Math.max(0.4,s-0.05);refresh();};
  $('eCopy').onclick=()=>{
    const i=$('eUrl');
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(i.value);
    else{i.select();try{document.execCommand('copy')}catch(e){}}
    $('eCopy').textContent='Copied!';setTimeout(()=>$('eCopy').textContent='Copy URL',1200);};
  let drag=null;
  el.addEventListener('pointerdown',e=>{fixPos();
    const r=el.getBoundingClientRect();
    drag={dx:e.clientX-r.left,dy:e.clientY-r.top};
    el.setPointerCapture(e.pointerId);e.preventDefault();});
  el.addEventListener('pointermove',e=>{if(!drag)return;
    el.style.left=(e.clientX-drag.dx)+'px';
    el.style.top=(e.clientY-drag.dy)+'px';refresh();});
  el.addEventListener('pointerup',()=>{drag=null;refresh();});
  fixPos();refresh();
})();
</script>
</body>
</html>
