<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FTGIOO Socials</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#6b1d29; --maroon-deep:#4e131d;
    --gold:#ffb320; --red:#c31f2f;
    --cream:#f6e7c9; --cream-dim:#dcc9a4;
  }
  html,body{margin:0;padding:0;background:transparent;overflow:hidden}
  body{font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  #bar{
    display:flex;align-items:center;gap:18px;
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    transform-origin:bottom center;
    --bgop:1;background:linear-gradient(160deg,rgba(107,29,41,var(--bgop)) 0%,rgba(78,19,29,var(--bgop)) 100%);
    border:3px solid var(--gold);
    box-shadow:0 10px 32px -8px rgba(0,0,0,.6),
               inset 0 0 0 3px var(--maroon-deep),
               inset 0 0 0 5px var(--red);
    border-radius:14px;
    padding:10px 22px;white-space:nowrap;
  }
  .crest{width:42px;height:42px;flex-shrink:0;object-fit:contain;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .brand{font-family:'Graduate',serif;font-size:15px;letter-spacing:1.5px;color:var(--gold);
    text-shadow:1px 1px 0 #8f1622;padding-right:2px}
  .sep{color:var(--red);font-size:11px}
  .item{display:flex;align-items:center;gap:8px}
  .item svg{width:20px;height:20px;fill:var(--gold);flex-shrink:0;
    filter:drop-shadow(1px 1px 0 #8f1622)}
  .item span{font-weight:800;font-size:16.5px;color:var(--cream);letter-spacing:.3px}
  /* 1920x1080 logical canvas -> scaled to the real viewport so the editor and the
     stream share ONE coordinate system (what you place is exactly what shows, any resolution) */
  #su-stage{position:fixed;top:0;left:0;width:1920px;height:1080px;
    transform-origin:top left;transform:scale(var(--suk,1));will-change:transform}
</style>
</head>
<body>
<div id="bar"></div>

<script>
const Q=new URLSearchParams(location.search);
// ---- fidelity: normalize to a 1920x1080 stage scaled to the viewport ----
(function(){
  var st=document.getElementById('su-stage');
  if(!st){ st=document.createElement('div'); st.id='su-stage'; document.body.insertBefore(st, document.body.firstChild); }
  ["bar"].forEach(function(id){ var e=document.getElementById(id); if(e && e.parentNode!==st) st.appendChild(e); });
  function suk(){
    var k=Math.min(innerWidth/1920, innerHeight/1080);
    if(!isFinite(k)||k<=0) k=1;
    document.documentElement.style.setProperty('--suk', k);
  }
  suk(); addEventListener('resize', suk); addEventListener('orientationchange', suk);
})();


// Platform icons (Simple Icons paths, 24x24 viewBox)
const ICONS={
  ig:'M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.015 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.015 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.015-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.585-.074 4.85c-.061 1.17-.256 1.805-.421 2.227-.224.562-.479.96-.899 1.382-.419.419-.824.679-1.38.896-.42.164-1.065.36-2.235.413-1.274.057-1.649.07-4.859.07-3.211 0-3.586-.015-4.859-.074-1.171-.061-1.816-.256-2.236-.421-.569-.224-.96-.479-1.379-.899-.421-.419-.69-.824-.9-1.38-.165-.42-.359-1.065-.42-2.235-.045-1.26-.061-1.649-.061-4.844 0-3.196.016-3.586.061-4.861.061-1.17.255-1.814.42-2.234.21-.57.479-.96.9-1.381.419-.419.81-.689 1.379-.898.42-.166 1.051-.361 2.221-.421 1.275-.045 1.65-.06 4.859-.06zm0 5.678a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 1 0 0-12.324zM12 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm7.846-10.405a1.441 1.441 0 0 1-2.88 0 1.44 1.44 0 0 1 2.88 0z',
  x:'M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z',
  yt:'M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z M9.545 15.568V8.432L15.818 12l-6.273 3.568z',
  tt:'M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z',
  tw:'M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z'
};
// Order + which URL param controls each handle. Pass an empty param to hide one.
const PLATFORMS=[
  {key:'tw', param:'tw', def:'ftgioo'},
  {key:'yt', param:'yt', def:'ftgioo'},
  {key:'ig', param:'ig', def:'ft.gioo'},
  {key:'tt', param:'tt', def:'giovannaramos'},
  {key:'x',  param:'x',  def:'sosaisbacc'}
];
function icoHTML(k){
  if(k==='ig') return '<svg viewBox="0 0 24 24" style="fill:none;stroke:var(--gold);stroke-width:2.1;filter:drop-shadow(1px 1px 0 #8f1622)"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1.3" style="fill:var(--gold);stroke:none"/></svg>';
  return '<svg viewBox="0 0 24 24"><path d="'+ICONS[k]+'"/></svg>';
}

const bar=document.getElementById('bar');
// crest + brand
const crest=document.createElement('img'); crest.className='crest'; crest.src='crest.png'; crest.alt='';
const brand=document.createElement('span'); brand.className='brand'; brand.textContent='FTGIOO';
bar.append(crest,brand);

PLATFORMS.forEach(p=>{
  let h=Q.get(p.param);
  if(h===null) h=p.def;      // param absent -> default
  h=h.trim();
  if(!h) return;             // param empty -> hidden
  if(h[0]!=='@') h='@'+h;
  const sep=document.createElement('span'); sep.className='sep'; sep.textContent='★';
  const item=document.createElement('div'); item.className='item';
  item.innerHTML=icoHTML(p.key)+'<span>'+h.replace(/[<>&]/g,'')+'</span>';
  bar.append(sep,item);
});

// URL params: ?pos=bc|bl|br|tl|tr  ?scale=1.3  ?bg=00ff00
(function(){
  const bg=Q.get('bg');
  if(bg) document.body.style.background=/^[0-9a-fA-F]{6}$/.test(bg)?('#'+bg):bg;
  const pos=(Q.get('pos')||'center').toLowerCase();
  const s=parseFloat(Q.get('scale')||'1')||1;
  const off='14px';
  const P={center:{top:'50%',left:'50%',o:'center',cxy:true},bc:{bottom:off,left:'50%',o:'bottom center',x:true},
           bl:{bottom:off,left:off,o:'bottom left'},
           br:{bottom:off,right:off,o:'bottom right'},
           tl:{top:off,left:off,o:'top left'},
           tr:{top:off,right:off,o:'top right'},
           tc:{top:off,left:'50%',o:'top center',x:true}};
  const p=P[pos]||P.center;
  bar.style.top=bar.style.left=bar.style.right=bar.style.bottom='';
  ['top','left','right','bottom'].forEach(k=>{if(p[k])bar.style[k]=p[k];});
  bar.style.transformOrigin=p.o;
  bar.style.transform=(p.cxy?'translate(-50%,-50%) ':(p.x?'translateX(-50%) ':''))+(s!==1?('scale('+s+')'):'');
})();

// Free positioning (?px=..&py=.. percent of screen) + drag/resize editor (?edit=1)
(function(){
  const el=document.getElementById('bar');
  let s=parseFloat(Q.get('scale')||'1')||1;
  if(Q.has('px')||Q.has('py')){
    el.style.left=(parseFloat(Q.get('px'))||0)+'%';
    el.style.top=(parseFloat(Q.get('py'))||0)+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform=s!==1?('scale('+s+')'):'';
  }
  if(Q.get('edit')!=='1') return;
  // stream-accurate stage: a 16:9 frame that IS the 1920x1080 stream canvas
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;inset:0;background:#0c0d12;display:flex;align-items:center;justify-content:center;z-index:1';
  const frame=document.createElement('div');
  frame.style.cssText='position:relative;aspect-ratio:16/9;width:min(100vw - 16px,(100svh - 116px)*16/9);background-color:#161a22;background-image:repeating-linear-gradient(0deg,transparent 0 59px,#ffffff0d 59px 60px),repeating-linear-gradient(90deg,transparent 0 59px,#ffffff0d 59px 60px);border:1px solid #3a3f4c;border-radius:6px;overflow:visible;box-shadow:0 20px 60px -20px #000';
  const ftag=document.createElement('div');
  ftag.style.cssText='position:absolute;bottom:6px;right:10px;color:#5b6270;font:700 11px Archivo,sans-serif;letter-spacing:1px;pointer-events:none';
  ftag.textContent='STREAM FRAME · 1920 × 1080';
  frame.appendChild(ftag);
  stage.appendChild(frame);
  document.body.appendChild(stage);
  stage.style.touchAction='none';
  frame.appendChild(el);
  el.style.position='absolute'; el.style.zIndex='2'; el.style.visibility='';
  const fw=()=>frame.getBoundingClientRect();
  const fscale=()=>fw().width/1920;
  function place(pxPct,pyPct){
    el.style.left=pxPct+'%'; el.style.top=pyPct+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform='scale('+(s*fscale())+')';
  }
  const spx=parseFloat(Q.get('px')), spy=parseFloat(Q.get('py'));
  place(isNaN(spx)?4:spx, isNaN(spy)?6:spy);
  const ecss=document.createElement('style');
  ecss.textContent='#edittb{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:6px;align-items:center;background:#1b1016;border:2px solid #ffb320;border-radius:10px;padding:8px 10px;font-family:Archivo,sans-serif;max-width:96vw;flex-wrap:wrap;justify-content:center}#edittb button{background:#ffb320;border:none;border-radius:6px;font-weight:800;font-size:15px;width:32px;height:32px;cursor:pointer}#edittb .cp{width:auto;padding:0 12px;font-size:12px}#edittb input{width:min(280px,40vw);font-size:11px;padding:7px;border-radius:6px;border:1px solid #7d2433;background:#2a161d;color:#f6e7c9}#edittb span{color:#ffb320;font-weight:800;font-size:13px;min-width:46px;text-align:center}';
  document.head.appendChild(ecss);
  const tb=document.createElement('div'); tb.id='edittb';
  tb.innerHTML='<button id="eMinus">−</button><span id="eScale"></span><button id="ePlus">+</button><span id="ecoord" style="color:#ffd6a0;font-weight:800;font-size:12px;min-width:150px;text-align:center"></span><input id="eUrl" readonly><button id="eCopy" class="cp">Copy URL</button><button id="eSave" class="cp">💾 Save live</button><button id="eHide" class="cp">👁 Hide</button>';
  document.body.appendChild(tb);
  function pcts(){ const r=el.getBoundingClientRect(), f=fw();
    return {px:+(((r.left-f.left)/f.width)*100).toFixed(2), py:+(((r.top-f.top)/f.height)*100).toFixed(2)}; }
  function urlNow(){ const q=new URLSearchParams(location.search);
    q.delete('edit'); q.delete('pos');
    if(s!==1) q.set('scale',s.toFixed(2)); else q.delete('scale');
    const p=pcts(); q.set('px',p.px); q.set('py',p.py);
    if(el.style.width) q.set('w',Math.round(parseFloat(el.style.width))); else q.delete('w');
    if(el.style.height) q.set('h',Math.round(parseFloat(el.style.height))); else q.delete('h');
    return location.origin+location.pathname+'?'+q.toString(); }
  function refresh(){ document.getElementById('eScale').textContent=s.toFixed(2)+'×';
    el.style.transform='scale('+(s*fscale())+')';
    document.getElementById('eUrl').value=urlNow();
    var _p=pcts(), _ec=document.getElementById('ecoord');
    if(_ec) _ec.textContent='X '+_p.px+'%  ·  Y '+_p.py+'%  ·  '+Math.round(s*100)+'%'; }
  document.getElementById('ePlus').onclick=()=>{s=Math.min(3,+(s+0.05).toFixed(2));refresh();};
  document.getElementById('eMinus').onclick=()=>{s=Math.max(0.4,+(s-0.05).toFixed(2));refresh();};
  document.getElementById('eCopy').onclick=()=>{const i=document.getElementById('eUrl');
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(i.value);
    else{i.select();try{document.execCommand('copy')}catch(e){}}
    const b=document.getElementById('eCopy');b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy URL';},1200);};
  document.getElementById('eSave').onclick=async()=>{const b=document.getElementById('eSave');b.textContent='Saving…';
    try{const p=pcts();
      await ovPost({px:p.px,py:p.py,scale:+s.toFixed(2),
        w:el.style.width?Math.round(parseFloat(el.style.width)):null,
        h:el.style.height?Math.round(parseFloat(el.style.height)):null});
      b.textContent='Saved, live!';}
    catch(err){b.textContent='Failed: '+err.message;}
    setTimeout(()=>{b.textContent='💾 Save live';},2200);};
  let hiddenNow=false;
  document.getElementById('eHide').onclick=async()=>{const b=document.getElementById('eHide');
    try{hiddenNow=!hiddenNow;await ovPost({hidden:hiddenNow});b.textContent=hiddenNow?'👁 Show':'👁 Hide';}
    catch(err){hiddenNow=!hiddenNow;}};
  // ---- precise placement: snap-to-edge + numeric X/Y (accepts negatives, go past edges) ----
  function elPct(){var r=el.getBoundingClientRect(),f=fw();return{w:r.width/f.width*100,h:r.height/f.height*100};}
  function applyPos(px,py){place(px,py);refresh();}
  var prow=document.createElement('div');
  prow.style.cssText='width:100%;display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:7px';
  function snapBtn(txt,fn,title){var b=document.createElement('button');b.textContent=txt;b.title=title;b.style.cssText='background:#33161f;color:#ffb320;border:1px solid #7d2433;border-radius:6px;min-width:36px;height:34px;font-size:16px;font-weight:800;cursor:pointer';b.onclick=fn;prow.appendChild(b);}
  snapBtn('\u2B12',function(){applyPos(0,0);},'Snap to top-left corner');
  snapBtn('\u2912',function(){applyPos(pcts().px,0);},'Snap to top edge');
  snapBtn('\u2913',function(){var e=elPct();applyPos(pcts().px,100-e.h);},'Snap to bottom edge');
  snapBtn('\u21E4',function(){applyPos(0,pcts().py);},'Snap to left edge');
  snapBtn('\u21E5',function(){var e=elPct();applyPos(100-e.w,pcts().py);},'Snap to right edge');
  snapBtn('\u29C9',function(){var e=elPct();applyPos((100-e.w)/2,(100-e.h)/2);},'Center on screen');
  function nudge(dx,dy){var c=pcts();applyPos(+(c.px+dx).toFixed(2),+(c.py+dy).toFixed(2));}
  snapBtn('◀',function(){nudge(-1,0);},'Nudge left 1%');
  snapBtn('▲',function(){nudge(0,-1);},'Nudge up 1% (can go above the top edge)');
  snapBtn('▼',function(){nudge(0,1);},'Nudge down 1%');
  snapBtn('▶',function(){nudge(1,0);},'Nudge right 1%');
  function numIn(lbl){var wrap=document.createElement('label');wrap.style.cssText='display:flex;align-items:center;gap:3px;color:#ffd6a0;font-size:11px;font-weight:800';var i=document.createElement('input');i.type='number';i.step='0.5';i.style.cssText='width:68px;font-size:12px;padding:6px;border-radius:5px;border:1px solid #7d2433;background:#2a161d;color:#f6e7c9';wrap.append(document.createTextNode(lbl),i);prow.appendChild(wrap);return i;}
  var xin=numIn('X%'), yin=numIn('Y%');
  function goNum(){var cur=pcts();var px=parseFloat(xin.value),py=parseFloat(yin.value);if(isNaN(px))px=cur.px;if(isNaN(py))py=cur.py;applyPos(px,py);}
  var goBtn=document.createElement('button');goBtn.textContent='Go';goBtn.style.cssText='background:#ffb320;color:#160a24;border:none;border-radius:6px;height:34px;padding:0 14px;font-weight:800;cursor:pointer';goBtn.onclick=goNum;prow.appendChild(goBtn);
  function curPos(){var p=pcts();return{px:p.px,py:p.py,scale:+s.toFixed(3),w:el.style.width?Math.round(parseFloat(el.style.width)):null,h:el.style.height?Math.round(parseFloat(el.style.height)):null};}
  function cpBtn(txt,title,fn){var b=document.createElement('button');b.textContent=txt;b.title=title;b.style.cssText='background:#33161f;color:#ffb320;border:1px solid #7d2433;border-radius:6px;height:34px;padding:0 12px;font-weight:800;font-size:12px;cursor:pointer';b.onclick=fn;prow.appendChild(b);return b;}
  var copyB=cpBtn('Copy pos','Copy this exact position + size',function(){var j=JSON.stringify(curPos());try{localStorage.setItem('su_pos_clip',j);}catch(e){}if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(j);copyB.textContent='Copied \u2713';setTimeout(function(){copyB.textContent='Copy pos';},1200);});
  cpBtn('Paste pos','Apply a copied position + size',function(){var j=null;try{j=localStorage.getItem('su_pos_clip');}catch(e){}if(!j){alert('Nothing copied yet. Press Copy pos first (on any overlay).');return;}var o;try{o=JSON.parse(j);}catch(e){return;}if(typeof o.scale==='number')s=o.scale;el.style.width=(typeof o.w==='number')?o.w+'px':'';el.style.height=(typeof o.h==='number')?o.h+'px':'';if(typeof o.px==='number'&&typeof o.py==='number')place(o.px,o.py);refresh();});
  xin.addEventListener('keydown',function(e){if(e.key==='Enter')goNum();});
  yin.addEventListener('keydown',function(e){if(e.key==='Enter')goNum();});
  tb.appendChild(prow);
  el.style.cursor='move'; el.style.touchAction='none';

  // ---- selection box, 8 handles: SIDES stretch width/height, CORNERS scale ----
  const sel=document.createElement('div');
  sel.style.cssText='position:absolute;border:2px dashed #ffb320;pointer-events:none;z-index:4;border-radius:6px';
  frame.appendChild(sel);
  const HS='position:absolute;width:22px;height:22px;background:#ffb320;border:3px solid #8f1622;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.6);pointer-events:auto;touch-action:none;margin:-11px 0 0 -11px';
  const HD={nw:['0%','0%','nwse-resize'],n:['50%','0%','ns-resize'],ne:['100%','0%','nesw-resize'],
            e:['100%','50%','ew-resize'],se:['100%','100%','nwse-resize'],s:['50%','100%','ns-resize'],
            sw:['0%','100%','nesw-resize'],w:['0%','50%','ew-resize']};
  let rs=null;
  function syncSel(){
    const r0=el.getBoundingClientRect(), f0=fw();
    sel.style.left=(r0.left-f0.left)+'px';
    sel.style.top=(r0.top-f0.top)+'px';
    sel.style.width=r0.width+'px';
    sel.style.height=r0.height+'px';
  }
  Object.keys(HD).forEach(mode=>{
    const lx=HD[mode][0], ty=HD[mode][1], cur=HD[mode][2];
    const hnd=document.createElement('div');
    hnd.style.cssText=HS+';left:'+lx+';top:'+ty+';cursor:'+cur;
    hnd.addEventListener('pointerdown',e=>{
      e.stopPropagation(); e.preventDefault();
      const r0=el.getBoundingClientRect(), f0=fw();
      const k=s*fscale();
      rs={mode:mode,x:e.clientX,y:e.clientY,w:r0.width,h:r0.height,s0:s,k:k,
          lw:r0.width/k, lh:r0.height/k,
          L:r0.left-f0.left,T:r0.top-f0.top};
      el.style.left=rs.L+'px'; el.style.top=rs.T+'px';
      el.style.right='';el.style.bottom='';
      hnd.setPointerCapture(e.pointerId);
    });
    hnd.addEventListener('pointermove',e=>{
      if(!rs||rs.mode!==mode) return;
      const dx=e.clientX-rs.x, dy=e.clientY-rs.y;
      if(mode==='e'||mode==='w'){
        // stretch WIDTH only; opposite edge stays planted
        const newW=Math.max(120, rs.lw+(mode==='e'?dx:-dx)/rs.k);
        el.style.width=newW+'px';
        if(mode==='w') el.style.left=(rs.L+rs.w-newW*rs.k)+'px';
      }else if(mode==='n'||mode==='s'){
        // stretch HEIGHT only; opposite edge stays planted
        const newH=Math.max(46, rs.lh+(mode==='s'?dy:-dy)/rs.k);
        el.style.height=newH+'px';
        if(mode==='n') el.style.top=(rs.T+rs.h-newH*rs.k)+'px';
      }else{
        // corners: proportional scale, opposite corner stays planted
        const rw1=(rs.w+dx)/rs.w, rw2=(rs.w-dx)/rs.w, rh1=(rs.h+dy)/rs.h, rh2=(rs.h-dy)/rs.h;
        let r=1;
        if(mode==='se')r=Math.max(rw1,rh1); else if(mode==='nw')r=Math.max(rw2,rh2);
        else if(mode==='ne')r=Math.max(rw1,rh2); else r=Math.max(rw2,rh1);
        s=Math.max(0.3,Math.min(3.5,+(rs.s0*r).toFixed(3)));
        const k2=s/rs.s0, nw2=rs.w*k2, nh2=rs.h*k2;
        let L=rs.L, T=rs.T;
        if(mode==='nw'){ L=rs.L+rs.w-nw2; T=rs.T+rs.h-nh2; }
        else if(mode==='ne'){ T=rs.T+rs.h-nh2; }
        else if(mode==='sw'){ L=rs.L+rs.w-nw2; }
        el.style.left=L+'px'; el.style.top=T+'px';
        el.style.transform='scale('+(s*fscale())+')';
      }
      refresh(); syncSel();
    });
    hnd.addEventListener('pointerup',()=>{rs=null;refresh();syncSel();});
    sel.appendChild(hnd);
  });
  setInterval(syncSel,150);

  // body drag = move only (never resizes)
  let moved=false;
  let drag=null;
  el.addEventListener('pointerdown',e=>{if(!e.isPrimary)return;moved=true;const r=el.getBoundingClientRect();
    drag={dx:e.clientX-r.left,dy:e.clientY-r.top}; el.setPointerCapture(e.pointerId); e.preventDefault();});
  el.addEventListener('pointermove',e=>{ if(!drag)return; const f=fw();
    el.style.left=(e.clientX-drag.dx-f.left)+'px'; el.style.top=(e.clientY-drag.dy-f.top)+'px'; refresh(); syncSel();});
  el.addEventListener('pointerup',()=>{drag=null;refresh();syncSel();});

  // keyboard precision: arrows move 1px (Shift=10px), + / - fine-scale
  addEventListener('keydown',e=>{
    if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')) return;
    const step=e.shiftKey?10:1;
    const r0=el.getBoundingClientRect(), f0=fw();
    let L=r0.left-f0.left, T=r0.top-f0.top, hit=true;
    if(e.key==='ArrowLeft')L-=step; else if(e.key==='ArrowRight')L+=step;
    else if(e.key==='ArrowUp')T-=step; else if(e.key==='ArrowDown')T+=step;
    else if(e.key==='+'||e.key==='='){ s=Math.min(3.5,+(s+0.01).toFixed(3)); }
    else if(e.key==='-'||e.key==='_'){ s=Math.max(0.3,+(s-0.01).toFixed(3)); }
    else hit=false;
    if(!hit) return;
    e.preventDefault(); moved=true;
    el.style.left=L+'px'; el.style.top=T+'px';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform='scale('+(s*fscale())+')';
    refresh(); syncSel();
  });
  syncSel();
  addEventListener('resize',()=>{ const p=pcts(); place(p.px,p.py); refresh(); });
  refresh();
  // open the editor AT the live saved position so it matches the stream
  fetch('https://ftgioo-su2026-api-production.up.railway.app/api/overlay',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(j){
      if(!j.ok||moved||drag) return;
      var c=(j.overlays&&j.overlays['socials'])||{};
      if(typeof c.scale==='number') s=c.scale;
      if(typeof c.w==='number') el.style.width=c.w+'px';
      if(typeof c.h==='number') el.style.height=c.h+'px';
      if(typeof c.px==='number'&&typeof c.py==='number') place(c.px,c.py);
      else el.style.transform='scale('+(s*fscale())+')';
      refresh();
    }).catch(function(){});
})();

/* ---------- live remote settings (Save live in ?edit=1 controls the on-air overlay) ---------- */
const API='https://ftgioo-su2026-api-production.up.railway.app';
const OVKEY='socials';
let ovCfg=null;
const URLBGOP=(function(){const v=parseFloat(Q.get('bgop'));return isNaN(v)?1:Math.max(0,Math.min(1,v));})();
document.getElementById('bar').style.setProperty('--bgop',URLBGOP);
(function(){ const uw=parseFloat(Q.get('w')), uh=parseFloat(Q.get('h'));
  const t=document.getElementById('bar');
  if(!isNaN(uw)) t.style.width=uw+'px';
  if(!isNaN(uh)) t.style.height=uh+'px'; })();
function getSess(){ try{return JSON.parse(localStorage.getItem('su_hub_sess'));}catch(e){return null;} }
function askLogin(){
  return new Promise(function(resolve,reject){
    var old=document.getElementById('sulogin'); if(old) old.remove();
    var css=document.getElementById('sulogincss');
    if(!css){ css=document.createElement('style'); css.id='sulogincss';
      css.textContent='#sulogin{position:fixed;inset:0;background:rgba(10,5,8,.78);display:flex;align-items:center;justify-content:center;z-index:999;font-family:Archivo,sans-serif}#sulogin .bx{width:min(360px,92vw);background:linear-gradient(160deg,#3d1620,#24101a);border:3px solid #ffb320;border-radius:16px;padding:22px;text-align:center;box-shadow:0 30px 80px -20px #000,inset 0 0 0 3px #24101a,inset 0 0 0 5px #c31f2f}#sulogin h3{margin:0 0 4px;font-family:Graduate,serif;color:#ffb320;font-size:15px;letter-spacing:1.5px;text-shadow:1px 1px 0 #8f1622}#sulogin .m{color:#dcc9a4;font-size:12px;margin-bottom:14px}#sulogin .us{display:flex;gap:7px;margin-bottom:11px}#sulogin .u{flex:1;padding:11px 2px;border-radius:9px;border:2px solid #5d2b3c;background:#33161f;color:#c9ab9a;font-family:Graduate,serif;font-size:12.5px;cursor:pointer}#sulogin .u.sel{border-color:#ffb320;color:#ffb320;background:#3d1c14}#sulogin input{width:100%;box-sizing:border-box;background:#33161f;border:1px solid #5d2b3c;color:#f6e7c9;border-radius:9px;padding:11px;font-size:16px;text-align:center;margin-bottom:11px}#sulogin .bt{display:flex;gap:8px}#sulogin button.go{flex:1;background:#ffb320;color:#2a1108;border:none;border-radius:9px;padding:11px;font-weight:800;font-size:13px;cursor:pointer}#sulogin button.cx{flex:1;background:#33161f;color:#f6e7c9;border:1px solid #5d2b3c;border-radius:9px;padding:11px;font-weight:800;font-size:13px;cursor:pointer}#sulogin .er{color:#ff8a8a;font-size:12px;font-weight:700;min-height:16px;margin-top:8px}';
      document.head.appendChild(css);
    }
    var wrap=document.createElement('div'); wrap.id='sulogin';
    wrap.innerHTML='<div class="bx"><h3>Streamer University</h3><div class="m">Confirm your identity to control the live stream</div><div class="us"><button class="u sel" data-u="tdot">Tdot</button><button class="u" data-u="haylee">Haylee</button><button class="u" data-u="gio">Gio</button></div><input type="password" placeholder="your password" autocomplete="current-password"><div class="bt"><button class="go">Confirm</button><button class="cx">Cancel</button></div><div class="er"></div></div>';
    document.body.appendChild(wrap);
    var user='tdot';
    wrap.querySelectorAll('.u').forEach(function(b){ b.onclick=function(){ user=b.dataset.u;
      wrap.querySelectorAll('.u').forEach(function(x){x.classList.toggle('sel',x===b);}); }; });
    var inp=wrap.querySelector('input'), er=wrap.querySelector('.er'), go=wrap.querySelector('.go');
    setTimeout(function(){ inp.focus(); },50);
    function submit(){
      if(!inp.value){ er.textContent='Enter your password.'; return; }
      go.textContent='Checking…'; go.disabled=true;
      fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user:user,pass:inp.value})})
      .then(function(r){ return r.json().then(function(j){ return {r:r,j:j}; }); })
      .then(function(x){
        if(x.r.ok&&x.j.ok){
          try{ localStorage.setItem('su_hub_sess',JSON.stringify({token:x.j.token,user:x.j.user,exp:x.j.exp})); }catch(e){}
          wrap.remove(); resolve(x.j.token);
        }else{
          er.textContent=(x.j&&x.j.error)||'Login failed.';
          go.textContent='Confirm'; go.disabled=false;
        }
      })
      .catch(function(){ er.textContent='Cannot reach the server. Try again.'; go.textContent='Confirm'; go.disabled=false; });
    }
    go.onclick=submit;
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });
    wrap.querySelector('.cx').onclick=function(){ wrap.remove(); reject(new Error('Cancelled')); };
  });
}
async function ovToken(){ var s0=getSess(); if(s0&&s0.token) return s0.token; return askLogin(); }
async function ovPost(cfg){
  var token=await ovToken();
  var r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:OVKEY,cfg:cfg,token:token})});
  if(r.status===403){
    try{ localStorage.removeItem('su_hub_sess'); }catch(e){}
    token=await askLogin();
    r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:OVKEY,cfg:cfg,token:token})});
  }
  var j=await r.json().catch(function(){ return {}; });
  if(!r.ok||!j.ok) throw new Error((j&&j.error)||('HTTP '+r.status));
  return j;
}
const CAL_INFO={campus:{c:'#ff2d95',n:'CAMPUS FEED',i:0},socials:{c:'#12e0ff',n:'SOCIALS BAR',i:1},subs:{c:'#8dff3a',n:'SUB COUNTER',i:2},alerts:{c:'#ff9d00',n:'ALERTS',i:3}};
let suCalEl=null;
function suCalib(on){
  if(on && !suCalEl){
    const ci=CAL_INFO[OVKEY]||{c:'#ff2d95',n:(typeof OVKEY==='string'?OVKEY.toUpperCase():'OVERLAY'),i:0};
    const ins=ci.i*9;
    suCalEl=document.createElement('div');
    suCalEl.style.cssText='position:fixed;left:'+ins+'px;top:'+ins+'px;right:'+ins+'px;bottom:'+ins+'px;pointer-events:none;z-index:2147483000;border:6px solid '+ci.c+';box-sizing:border-box;border-radius:2px';
    const tick=p=>'<div style="position:absolute;'+p+';width:42px;height:42px;background:'+ci.c+'"></div>';
    suCalEl.innerHTML=tick('top:-6px;left:-6px')+tick('top:-6px;right:-6px')+tick('bottom:-6px;left:-6px')+tick('bottom:-6px;right:-6px')+
      '<div style="position:fixed;left:14px;top:'+(14+ci.i*42)+'px;display:flex;align-items:center;gap:10px;background:#0a0406e6;border:2px solid '+ci.c+';border-radius:11px;padding:9px 14px;font-family:Archivo,-apple-system,sans-serif;font-weight:800;font-size:15px;color:#fff;white-space:nowrap;text-shadow:0 1px 2px #000"><span style="width:16px;height:16px;border-radius:4px;background:'+ci.c+';box-shadow:0 0 0 2px #0007"></span>'+ci.n+' — its frame must touch all 4 screen edges. If not, reset THIS layer full-screen in TVU Go.</div>';
    suCalEl.setAttribute('data-sucalib',ci.n);
    suCalEl.dataset.calColor=ci.c;
    document.body.appendChild(suCalEl);
  } else if(!on && suCalEl){ suCalEl.remove(); suCalEl=null; }
}
function applyOvCfg(){
  if(Q.get('edit')==='1'||!ovCfg) return;
  suCalib(!!ovCfg.calib);
  const el=document.getElementById('bar');
  el.style.visibility=ovCfg.hidden?'hidden':'';
  el.style.setProperty('--bgop',(typeof ovCfg.bgop==='number')?ovCfg.bgop:URLBGOP);
  el.style.width=(typeof ovCfg.w==='number')?ovCfg.w+'px':'';
  el.style.height=(typeof ovCfg.h==='number')?ovCfg.h+'px':'';
  if(typeof ovCfg.px==='number'&&typeof ovCfg.py==='number'){
    el.style.left=ovCfg.px+'%'; el.style.top=ovCfg.py+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    const sc=(typeof ovCfg.scale==='number')?ovCfg.scale:1;
    el.style.transform=sc!==1?('scale('+sc+')'):'';
  }else{
    el.style.left='50%'; el.style.top='50%'; el.style.right='';el.style.bottom='';
    el.style.transformOrigin='center';
    const sc2=(typeof ovCfg.scale==='number')?ovCfg.scale:1;
    el.style.transform='translate(-50%,-50%)'+(sc2!==1?(' scale('+sc2+')'):'');
  }
}
async function pollOvCfg(){
  try{ const r=await fetch(API+'/api/overlay',{cache:'no-store'}); const j=await r.json();
    if(j.ok){ ovCfg=(j.overlays&&j.overlays[OVKEY])||{}; applyOvCfg(); } }catch(e){}
}
pollOvCfg(); setInterval(pollOvCfg,9000);
