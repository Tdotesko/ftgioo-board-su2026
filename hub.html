<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#190b10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SU 2026 Hub">
<link rel="apple-touch-icon" href="crest.png">
<title>SU 2026 · Command Center</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#190b10; --panel:#2a1219; --panel2:#33161f; --line:#4a2230; --line2:#5d2b3c;
    --gold:#ffb320; --gold-soft:#ffc95e; --red:#c31f2f; --red-deep:#8f1622;
    --cream:#f6e7c9; --dim:#c9ab9a; --grey:#8d7370; --green:#57c25f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--cream);
    font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;
    overscroll-behavior-y:contain;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  .wrap{max-width:1060px;margin:0 auto;padding:0 14px}
  h1,h2,h3{font-family:'Graduate',serif;letter-spacing:1px}
  button{font-family:inherit;cursor:pointer}
  button,.tab,.dch,.usr,a.btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  input,textarea,select{font-family:inherit;background:var(--panel2);border:1px solid var(--line2);
    color:var(--cream);border-radius:9px;padding:10px 12px;font-size:16px}
  textarea{width:100%;resize:vertical;min-height:52px;line-height:1.4}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--gold);outline-offset:0}
  .btn{background:var(--gold);color:#2a1108;border:none;border-radius:9px;
    padding:10px 16px;font-weight:800;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:hover{filter:brightness(1.07)}
  .btn.sec{background:var(--panel2);color:var(--cream);border:1px solid var(--line2)}
  .btn.sm{padding:8px 12px;font-size:12px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;
    letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
  .chip .d{width:7px;height:7px;border-radius:50%}
  .chip.on{background:#57c25f22;color:var(--green);border:1px solid #57c25f55}
  .chip.on .d{background:var(--green)}
  .chip.off{background:#8d737022;color:var(--grey);border:1px solid #8d737055}
  .chip.off .d{background:var(--grey)}
  .chip.live{background:var(--gold);color:#2a1108}
  .chip.live .d{background:var(--red);animation:pulse 1.4s infinite}
  .chip.man{background:#c31f2f22;color:#ff9a9a;border:1px solid #c31f2f66}
  .chip.man .d{background:var(--red)}
  @keyframes pulse{50%{opacity:.4}}

  /* login */
  #login{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
  .loginbox{width:100%;max-width:420px;background:var(--panel);border:2px solid var(--line2);
    border-radius:20px;padding:34px 30px;text-align:center;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.8), inset 0 0 0 3px var(--bg), inset 0 0 0 5px var(--red-deep)}
  .loginbox img{width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 5px 10px rgba(0,0,0,.5))}
  .loginbox h1{font-size:19px;color:var(--gold);margin:12px 0 2px;text-shadow:1px 1px 0 var(--red-deep)}
  .loginbox .sub2{color:var(--dim);font-size:13px;margin-bottom:20px}
  .users{display:flex;gap:8px;margin-bottom:14px}
  .usr{flex:1;padding:13px 4px;border-radius:11px;border:2px solid var(--line2);background:var(--panel2);
    color:var(--dim);font-family:'Graduate',serif;font-size:14px;letter-spacing:1px}
  .usr.sel{border-color:var(--gold);color:var(--gold);background:#3d1c14}
  #pass{width:100%;margin-bottom:14px;text-align:center}
  #loginbtn{width:100%;padding:13px;font-size:15px}
  #loginerr{color:#ff8a8a;font-size:13px;font-weight:700;margin-top:10px;min-height:18px}

  /* shell */
  #app{display:none}
  header{background:linear-gradient(160deg,#3d1620,#24101a);border-bottom:2px solid var(--line);padding:12px 0}
  .hrow{display:flex;align-items:center;gap:12px}
  .hrow img{width:44px;height:44px;object-fit:contain}
  .hrow h1{font-size:15px;color:var(--gold);text-shadow:1px 1px 0 var(--red-deep);line-height:1.3}
  .hrow h1 span{display:block;font-family:'Archivo';font-weight:700;font-size:10.5px;color:var(--dim);
    letter-spacing:2px;text-transform:uppercase}
  .me{margin-left:auto;display:flex;align-items:center;gap:9px}
  .me .who{font-weight:800;font-size:13px}
  nav{position:sticky;top:0;z-index:20;background:#190b10f2;backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .tabs{display:flex;gap:4px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:10px 16px;border-radius:9px;background:transparent;border:1px solid transparent;
    color:var(--dim);font-weight:800;font-size:13px}
  .tab.act{background:var(--panel);border-color:var(--line2);color:var(--gold)}
  main{padding:16px 0 84px}
  .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(min(235px,100%),1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px}
  .card h3{margin:0 0 8px;font-size:12px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
  .big{font-size:26px;font-weight:800;line-height:1.2}
  .muted{color:var(--dim);font-size:12.5px}
  .row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .sect{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:13px}
  .sect h2{margin:0 0 11px;font-size:14px;color:var(--gold);text-shadow:1px 1px 0 var(--red-deep)}
  .sect>details>summary{cursor:pointer;font-family:'Graduate',serif;font-size:14px;color:var(--gold);
    text-shadow:1px 1px 0 var(--red-deep);letter-spacing:1px;list-style:none}
  .sect>details>summary::-webkit-details-marker{display:none}
  .sect>details>summary::after{content:' ▾';color:var(--dim)}
  .sect>details[open]>summary::after{content:' ▴'}
  .src{font-size:11.5px;font-weight:700;color:var(--green)}
  .src.man{color:var(--gold-soft)}
  .cmdrow{padding:12px 0;border-top:1px solid var(--line)}
  .cmdrow:first-of-type{border-top:none}
  .cmdrow .nm{font-family:ui-monospace,Consolas,monospace;font-weight:800;color:var(--gold);font-size:13.5px}

  /* run show */
  .nowbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .nowlbl{font-weight:800;font-size:14.5px}
  .nowlbl .mu{color:var(--dim);font-weight:700}
  .daychips{display:flex;gap:7px;margin:2px 0 10px;flex-wrap:wrap}
  .dch{padding:9px 15px;border-radius:20px;border:1px solid var(--line2);background:var(--panel2);
    color:var(--dim);font-weight:800;font-size:13px;position:relative}
  .dch.act{background:var(--gold);color:#2a1108;border-color:var(--gold)}
  .dch.today::after{content:"";position:absolute;top:5px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--red)}
  .stepper2{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .stepper2::-webkit-scrollbar{display:none}
  .sch{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:18px;
    border:1px solid var(--line2);background:var(--panel2);color:var(--dim);font-weight:800;font-size:12px;cursor:pointer}
  .sch.act{background:var(--gold);color:#2a1108;border-color:var(--gold)}
  .sch .sd{width:7px;height:7px;border-radius:50%;background:var(--grey)}
  .sch.done .sd{background:var(--green)}
  .sch.act .sd{background:#2a1108}
  .mcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .mcard.act{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 8px 30px -12px #ffb32055}
  .mhead{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .mtime{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .mlbl{color:var(--dim);font-size:13px}
  .tg{font-size:10.5px;font-weight:800;letter-spacing:1px;padding:3px 9px;border-radius:14px;text-transform:uppercase}
  .tg.set{background:#4a8cff22;color:#7fb0ff;border:1px solid #4a8cff55}
  .tg.session{background:#57c25f22;color:var(--green);border:1px solid #57c25f55}
  .tg.break{background:#ffb32022;color:var(--gold-soft);border:1px solid #ffb32055}
  .tg.end{background:#8d737022;color:var(--grey);border:1px solid #8d737055}
  .here{background:var(--gold);color:#2a1108;font-size:10.5px;font-weight:800;padding:4px 10px;
    border-radius:14px;letter-spacing:.8px;text-transform:uppercase;margin-left:auto}
  .donechip{color:var(--green);font-size:11.5px;font-weight:800}
  .note2{color:var(--gold-soft);font-size:12px;margin-top:6px}
  .mitem{display:flex;gap:9px;margin-top:9px;align-items:stretch}
  .mcmd{flex-shrink:0;width:84px;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;
    font-weight:800;color:var(--gold);padding-top:9px}
  .mcmd.chat{color:#d9a0ff;font-size:10.5px;line-height:1.25}
  .mtxt{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    padding:8px 10px;font-size:13px;word-break:break-word}
  .mitem.chat .mtxt{border-style:dashed;border-color:#b06fd455;background:#b06fd410}
  .mfoot{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}

  /* overlays */
  .ovgrid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr))}
  .ovcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px}
  .ovcard h3{margin:0;font-size:15px;color:var(--cream);font-family:'Archivo';font-weight:800}
  .ovcard .desc{color:var(--dim);font-size:12.5px;margin:4px 0 10px}
  .ovcard .cfg{font-size:11.5px;color:var(--grey);margin:8px 0;font-variant-numeric:tabular-nums}
  .alx{display:grid;gap:8px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-top:10px;
    padding-top:10px;border-top:1px solid var(--line)}
  .alx label{font-size:11px;color:var(--dim);font-weight:700;display:flex;flex-direction:column;gap:4px}
  .it.liverow{background:#33161f;border:1px solid #ffb32044;border-radius:11px;padding:11px 10px;margin-top:6px}
  .it.liverow+.mx{border-top:none}
  .mx{padding:2px 0 12px}
  .setintro{color:var(--dim);font-size:13.5px;line-height:1.6;margin-bottom:14px}
  .lnk{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line);flex-wrap:wrap}
  .lnk:first-of-type{border-top:none}
  .lnk .ln{flex:1;min-width:180px}
  .lnk .ln b{display:block;font-size:14px;margin-bottom:3px}
  .lnk .ln code{font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:var(--gold-soft);
    word-break:break-all;background:var(--panel2);border:1px solid var(--line);border-radius:6px;
    padding:5px 8px;display:inline-block;line-height:1.5}
  .steps{counter-reset:st;display:flex;flex-direction:column;gap:11px}
  .steps .st{display:flex;gap:12px;align-items:flex-start;font-size:14px;line-height:1.55;color:var(--cream)}
  .steps .st::before{counter-increment:st;content:counter(st);flex-shrink:0;width:26px;height:26px;
    border-radius:50%;background:var(--gold);color:#2a1108;font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;margin-top:1px}
  .steps .st code,.setbox code{font-family:ui-monospace,Consolas,monospace;font-size:12.5px;
    background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:var(--gold-soft)}
  .setbox{font-size:14px;line-height:1.7;color:var(--cream)}
  .setbox b{color:var(--gold-soft)}
  .setbox.gold{border-color:#ffb32066}
  .actrow2{font-size:12.5px;color:var(--dim);padding:7px 0;border-top:1px solid var(--line)}
  .actrow2:first-child{border-top:none}
  .actrow2 b{color:var(--cream)}
  .qk{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  #toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--panel);border:2px solid var(--gold);color:var(--cream);padding:11px 17px;border-radius:11px;
    font-size:13.5px;font-weight:700;opacity:0;transition:opacity .25s;z-index:60;max-width:92%;text-align:center}
  #toast.bad{border-color:var(--red)}

  @media (pointer:coarse){
    .btn{min-height:44px}.btn.sm{min-height:42px}
    .tab,.dch,.sch{min-height:42px;display:inline-flex;align-items:center}
    input,select{min-height:46px}.usr{min-height:50px}
  }
  @media (max-width:640px){
    header{padding:9px 0}.hrow{gap:9px}.hrow img{width:36px;height:36px}
    .hrow h1{font-size:12.5px}.hrow h1 span{font-size:9.5px;letter-spacing:1.2px}
    .me .who{font-size:11.5px}.big{font-size:22px}
    .sect,.card,.mcard{padding:12px}
    .mcmd{width:74px;font-size:10.5px}
  }
</style>
</head>

</div>

<script>
const API='https://ftgioo-su2026-api-production.up.railway.app';
const $=id=>document.getElementById(id);
const BD=JSON.parse($('bdata').textContent).days;
const CMDS=[['current','!current'],['professor','!professor'],['next','!nextclass'],['today','!today']];
const FIELD={'!current':'current','!professor':'professor','!nextclass':'next','!today':'today'};
const TAGS={set:['Pre-stream','set'],session:['In class','session'],break:['Break','break'],end:['End','end']};
const SOUNDS=['sparkle','chime','bell','coin','tada','pop','fanfare'];
const OVS=[
 {id:'campus',t:'Campus Feed',d:'All-in-one: class card, NOW STARTING takeover, countdown, rotating subs/socials.',u:'campus.html'},
 {id:'socials',t:'Socials Bar',d:'Twitch · YouTube · IG · TikTok · X handles with logos.',u:'socials.html'},
 {id:'subs',t:'Sub Counter',d:'Live sub count with the gold goal bar.',u:'subs.html'},
 {id:'alerts',t:'Alerts',d:'Sub / resub / gifted subs / raid pop-ups with confetti + sound.',u:'alerts.html',al:true}
];
let sess=null, ST=null, OV=null, tab='dash', day=null;
const openLines=new Set();

/* ---------- session ---------- */
try{ sess=JSON.parse(localStorage.getItem('su_hub_sess')); }catch(e){}
function saveSess(){ localStorage.setItem('su_hub_sess',JSON.stringify(sess)); }
function showLogin(msg){
  $('app').style.display='none';
  $('login').style.display='flex';
  if(msg!==undefined) $('loginerr').textContent=msg||'';
}
function logout(){
  sess=null; try{localStorage.removeItem('su_hub_sess');}catch(e){}
  showLogin('');
}
window.addEventListener('error',ev=>{
  try{ const el=$('loginerr');
    if(el && $('login').style.display!=='none') el.textContent='Something went wrong: '+(ev.message||'unknown error');
  }catch(e){}
});
function toast(m,bad){
  let el=$('toast'); if(!el){el=document.createElement('div');el.id='toast';document.body.appendChild(el);}
  el.textContent=m; el.className=bad?'bad':''; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',2600);
}
async function api(path,body){
  const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({},body,{token:sess&&sess.token}))});
  const j=await r.json().catch(()=>({}));
  if(r.status===403){ toast('Session expired, log in again',true); logout(); $('loginerr').textContent='Session expired. Please log in again.'; throw new Error('Session expired'); }
  if(!r.ok||!j.ok) throw new Error((j&&j.error)||('HTTP '+r.status));
  return j;
}

/* ---------- login ---------- */
let pickedUser='tdot';
document.querySelectorAll('.usr').forEach(b=>{
  b.addEventListener('click',()=>{ pickedUser=b.dataset.u;
    document.querySelectorAll('.usr').forEach(x=>x.classList.toggle('sel',x===b)); });
});
document.querySelector('.usr').classList.add('sel');
async function doLogin(){
  const btn=$('loginbtn');
  $('loginerr').textContent='';
  if(!$('pass').value){ $('loginerr').textContent='Enter your password.'; return; }
  btn.disabled=true; btn.textContent='Checking…';
  try{
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user:pickedUser,pass:$('pass').value})});
    let j={}; try{ j=await r.json(); }catch(e){}
    if(r.ok&&j.ok){
      sess={token:j.token,user:j.user,exp:j.exp}; saveSess(); $('pass').value='';
      await enterApp();
    }else{
      $('loginerr').textContent=(j&&j.error)||('Login failed (HTTP '+r.status+'). Try again.');
    }
  }catch(e){
    $('loginerr').textContent='Can’t reach the server. Check your connection and try again.';
  }
  btn.disabled=false; btn.textContent='Enter the Hub';
}
$('loginbtn').addEventListener('click',doLogin);
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* ---------- helpers ---------- */
function ctStamp(){return new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',hour:'numeric',minute:'2-digit',hour12:true}).format(new Date());}
function editing(){ const a=document.activeElement;
  return a&&(a.tagName==='TEXTAREA'||a.tagName==='INPUT'||a.tagName==='SELECT')&&$('main').contains(a); }
function copyText(t,btn){
  const done=()=>{ if(btn){const o=btn.textContent;btn.textContent='Copied ✓';setTimeout(()=>btn.textContent=o,1300);} };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done).catch(()=>fb()); }
  else fb();
  function fb(){const x=document.createElement('textarea');x.value=t;document.body.appendChild(x);x.select();
    try{document.execCommand('copy')}catch(e){}document.body.removeChild(x);done();}
}

/* ---------- data ---------- */
async function refresh(force){
  try{
    const [s,o]=await Promise.all([
      fetch(API+'/api/state',{cache:'no-store'}).then(r=>r.json()),
      fetch(API+'/api/overlay',{cache:'no-store'}).then(r=>r.json())
    ]);
    if(s.ok) ST=s; if(o.ok) OV=o.overlays||{};
    if(!day&&ST) day=ST.effective.day;
    if(force||!editing()) render();
  }catch(e){/* keep last view */}
}

/* ---------- shell ---------- */
const TABS=[['dash','Dashboard'],['help','Setup'],['overlays','Overlays'],['run','Auto Commands'],['subs','Subs'],['activity','Activity']];
function renderTabs(){
  $('tabs').innerHTML='';
  TABS.forEach(([id,label])=>{
    const b=document.createElement('button'); b.className='tab'+(tab===id?' act':''); b.textContent=label;
    b.onclick=()=>{tab=id;render();window.scrollTo(0,0);};
    $('tabs').appendChild(b);
  });
}
function render(){
  if(!ST) return;
  renderTabs();
  const m=$('main'); m.innerHTML='';
  ({run:rRun,dash:rDash,overlays:rOverlays,help:rSetup,subs:rSubs,activity:rActivity})[tab](m);
}

/* ================= RUN SHOW ================= */
function effSection(){
  const d=BD.find(x=>x.id===ST.effective.day);
  return {d,i:ST.effective.section,sec:d?d.sections[ST.effective.section]:null};
}
function setClass(dayId,idx,label){
  api('/api/setclass',{day:dayId,section:idx})
    .then(()=>{toast((label||'Class')+' is live for chat + overlays');refresh(true);})
    .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
}
function rRun(m){
  const eff=effSection();

  // NOW bar
  const nb=document.createElement('div'); nb.className='sect';
  const modeChip=ST.control.mode==='auto'
    ?'<span class="chip on"><span class="d"></span>Auto by time</span>'
    :'<span class="chip man"><span class="d"></span>Manual'+(ST.control.updated_by?(' · '+ST.control.updated_by):'')+'</span>';
  nb.innerHTML='<div class="nowbar">'+modeChip+
    '<span class="nowlbl"><span class="mu">NOW ▸</span> '+(eff.sec?eff.sec.time+' · '+eff.sec.label:'-')+'</span>'+
    '<span class="muted">'+ST.serverCT.clock+' CT</span>'+
    '<span style="flex:1"></span>'+
    '<button class="btn sec sm" id="rAuto">↺ All auto</button>'+
    '<button class="btn sm" id="rNext">Next class →</button></div>';
  m.appendChild(nb);
  $('rAuto').onclick=()=>api('/api/auto',{}).then(()=>{toast('Everything back to auto (Central Time)');refresh(true);})
    .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
  $('rNext').onclick=()=>{
    const d=BD.find(x=>x.id===ST.effective.day); let di=BD.indexOf(d), i=ST.effective.section+1;
    if(i>=d.sections.length){ if(di<BD.length-1){di++;i=0;} else {toast('That was the last one. Semester complete 🎓');return;} }
    setClass(BD[di].id,i,BD[di].sections[i].label);
  };

  // custom class: something live that is not on the schedule (e.g. Film Club)
  const ccActive=OV&&OV.campus&&OV.campus.custom&&OV.campus.custom.title;
  const ccs=document.createElement('div'); ccs.className='sect';
  const cdet=document.createElement('details'); cdet.open=!!ccActive;
  const csum=document.createElement('summary');
  csum.textContent=ccActive?('🎬 Custom class LIVE: '+OV.campus.custom.title):'Custom class (something not on the schedule)';
  cdet.appendChild(csum);
  const chint=document.createElement('div'); chint.className='muted'; chint.style.margin='8px 0';
  chint.textContent='Puts a class that is not on the schedule live everywhere at once: chat commands and the Campus Feed. End it to snap back to the normal schedule.';
  cdet.appendChild(chint);
  const cin=document.createElement('input'); cin.placeholder='Class title, e.g. Film Club'; cin.style.cssText='width:100%;margin-bottom:8px';
  const pin2=document.createElement('input'); pin2.placeholder='Professor(s), e.g. DirectorOne & DirectorTwo'; pin2.style.cssText='width:100%;margin-bottom:8px';
  const fin=document.createElement('input'); fin.placeholder='Follow handles/links, e.g. @director1 & @director2'; fin.style.cssText='width:100%;margin-bottom:10px';
  if(ccActive){ cin.value=OV.campus.custom.title||''; pin2.value=OV.campus.custom.prof||''; fin.value=OV.campus.custom.follow||''; }
  const crow=document.createElement('div'); crow.className='row';
  const go=document.createElement('button'); go.className='btn sm'; go.textContent=ccActive?'Update custom class':'Go live with custom class';
  go.onclick=()=>{
    const t=cin.value.trim(); if(!t){toast('Enter a class title',true);return;}
    const p2=pin2.value.trim(), f2=fin.value.trim();
    const curTxt='🔔 CLASS IN SESSION: '+t+(p2?(' with '+p2):'')+(f2?('. Follow: '+f2):'');
    const profTxt='👨‍🏫 Now teaching: '+(p2||t)+(p2?(' ('+t+')'):'')+(f2?('. Follow: '+f2):'');
    go.textContent='Going live…';
    Promise.all([
      api('/api/cmd',{field:'current',value:curTxt}),
      api('/api/cmd',{field:'professor',value:profTxt}),
      api('/api/overlay',{name:'campus',cfg:{custom:{title:t,prof:p2,follow:f2}}})
    ]).then(()=>{toast(t+' is live: chat + Campus Feed');refresh(true);})
      .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);})
      .finally(()=>{go.textContent='Go live with custom class';});
  };
  const end=document.createElement('button'); end.className='btn sec sm'; end.textContent='End custom class (back to schedule)';
  end.onclick=()=>{
    end.textContent='Ending…';
    Promise.all([
      api('/api/cmd',{field:'current',value:''}),
      api('/api/cmd',{field:'professor',value:''}),
      api('/api/overlay',{name:'campus',cfg:{custom:null}})
    ]).then(()=>{toast('Back to the normal schedule');refresh(true);})
      .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);})
      .finally(()=>{end.textContent='End custom class (back to schedule)';});
  };
  crow.append(go,end);
  cdet.append(cin,pin2,fin,crow);
  ccs.appendChild(cdet);
  m.appendChild(ccs);

  // live commands editor (collapsed until needed)
  const cs=document.createElement('div'); cs.className='sect';
  const det=document.createElement('details'); det.open=false;
  const sum=document.createElement('summary'); sum.textContent='Edit live Fossabot commands (what chat sees)';
  det.appendChild(sum);
  CMDS.forEach(([f,label])=>{
    const c=ST.commands[f];
    const row=document.createElement('div'); row.className='cmdrow';
    row.innerHTML='<div class="row" style="margin-bottom:7px"><span class="nm">'+label+'</span>'+
      (c.source==='manual'
        ?('<span class="src man">✏️ manual'+(c.by?(' by '+c.by):'')+(c.at?(' · '+c.at):'')+'</span>')
        :'<span class="src">🟢 auto (by time)</span>')+
      (f==='next'&&c.suffix?('<span class="muted">chat also sees '+c.suffix+'</span>'):'')+'</div>';
    const ta=document.createElement('textarea'); ta.value=c.value||'';
    const rr=document.createElement('div'); rr.className='row'; rr.style.marginTop='8px';
    const b1=document.createElement('button'); b1.className='btn sm'; b1.textContent='Set live';
    b1.onclick=()=>api('/api/cmd',{field:f,value:ta.value})
      .then(()=>{toast(label+' updated for chat');refresh(true);}).catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
    const b2=document.createElement('button'); b2.className='btn sec sm'; b2.textContent='Auto';
    b2.onclick=()=>api('/api/cmd',{field:f,value:''})
      .then(()=>{toast(label+' back to auto');refresh(true);}).catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
    rr.append(b1,b2);
    row.append(ta,rr);
    det.appendChild(row);
  });
  cs.appendChild(det);
  m.appendChild(cs);

  // day chips
  const dc=document.createElement('div'); dc.className='daychips';

    const b=document.createElement('button');

  d.sections.forEach((sec,i)=>{

    (sec.items||[]).forEach(x=>{ if(x.cmd==='!professor'){ const mm=x.text.match(/Now teaching:\s*([^(]+?)\s*\(/); if(mm) prof=mm[1].trim(); } });
    const row=document.createElement('div'); row.className='it'+(live?' liverow':'');
    const sub2=[prof?('Prof · '+prof):'', mk?('✓ done '+(mk.at||'')+(mk.by?(' · '+mk.by):'')):'', sec.note?('⚠ '+sec.note):''].filter(Boolean).join('  ·  ');

      '<span class="tg '+tg[1]+'">'+tg[0]+'</span>'+

      (live?'<span class="chip live"><span class="d"></span>On air</span>':'');

    const b2=document.createElement('button'); b2.className='btn sec sm'; b2.textContent=mk?'Unmark':'✓ Done';
    b2.onclick=()=>api('/api/mark',{day:d.id,section:i,at:ctStamp()})
      .then(()=>{toast(mk?'Unmarked':'Marked done');refresh(true);})
      .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
    const b3=document.createElement('button'); b3.className='btn sec sm';
    row.append(b1,b2,b3);
    const key=d.id+':'+i;
    const mx=document.createElement('div'); mx.className='mx';
    const isOpen=openLines.has(key);
    mx.style.display=isOpen?'':'none';
    b3.textContent=isOpen?'Lines ▴':'Lines ▾';
    (sec.items||[]).forEach(x=>{
      const isChat=!!x.chat;
      const rowd=document.createElement('div'); rowd.className='mitem'+(isChat?' chat':'');
      const nm=document.createElement('div'); nm.className='mcmd'+(isChat?' chat':''); nm.textContent=x.cmd;
      const tx=document.createElement('div'); tx.className='mtxt'; tx.textContent=x.text;
      rowd.append(nm,tx);
      if(isChat){
        const b=document.createElement('button'); b.className='btn sec sm'; b.style.alignSelf='center'; b.textContent='Copy';
        b.onclick=()=>copyText(x.text,b);
        rowd.appendChild(b);
      }else{
        const f=FIELD[x.cmd];
        const b=document.createElement('button'); b.className='btn sm'; b.style.alignSelf='center'; b.textContent='Set';
        b.title='Make this the live '+x.cmd+' in chat';
        b.onclick=()=>{ b.textContent='…';
          api('/api/cmd',{field:f,value:x.text})
            .then(()=>{toast(x.cmd+' is live for chat');refresh(true);})
            .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);})
            .finally(()=>{b.textContent='Set';});
        };
        rowd.appendChild(b);
      }
      mx.appendChild(rowd);
    });
    b3.onclick=()=>{
      const open=mx.style.display!=='none';
      mx.style.display=open?'none':'';
      b3.textContent=open?'Lines ▾':'Lines ▴';
      if(open) openLines.delete(key); else openLines.add(key);
    };
    list.append(row,mx);
  });
  sect.appendChild(list);
  m.appendChild(sect);
}

/* ================= OVERLAYS ================= */
function rOverlays(m){
  const intro=document.createElement('div'); intro.className='sect';
  intro.innerHTML='<h2>Stream overlays</h2><div class="muted">These control the pages inside TVU Go, live; changes land on stream within ~9 seconds. <b>Move &amp; resize</b> opens the drag editor; hit 💾 Save live there.</div>';
  m.appendChild(intro);

  // emergency controls: calibration + panic switches for every overlay at once
  const em=document.createElement('div'); em.className='sect';
  em.innerHTML='<h2>Emergency controls</h2><div class="muted" style="margin-bottom:10px"><b>🔄 Reload all overlays</b> refreshes every browser source in TVU Go remotely (activates new features / code updates, no touching TVU). <b>Calibration</b> draws a labeled colored frame on each overlay (Campus=pink, Socials=cyan, Subs=green, Alerts=orange). On the stream every frame must touch all 4 screen edges. Any frame that floats, shrinks, or sits off-center = that named overlay was moved or resized inside TVU Go and needs its layer reset to full screen there. Our saved positions are untouched.</div>';
  const er=document.createElement('div'); er.className='row';
  function allPost(cfg,msg){
    Promise.all(OVS.map(o=>api('/api/overlay',{name:o.id,cfg:cfg})))
      .then(()=>{toast(msg);refresh(true);})
      .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
  }
  const mkE=(t,fn,sec)=>{const b=document.createElement('button');b.className='btn sm'+(sec?' sec':'');b.textContent=t;b.onclick=fn;er.appendChild(b);};
  mkE('📐 Calibration ON',()=>allPost({calib:true},'Calibration frames showing on all overlays'));
  mkE('Calibration OFF',()=>allPost({calib:null},'Calibration frames removed'),true);
  mkE('🚨 Hide ALL overlays',()=>allPost({hidden:true},'All overlays hidden on stream'));
  mkE('Show ALL overlays',()=>allPost({hidden:false},'All overlays visible again'),true);
  mkE('↺ Reset ALL positions',()=>allPost({px:null,py:null,scale:null,w:null,h:null},'All overlays back to default positions'),true);
  mkE('🔄 Reload all overlays',()=>{ if(!confirm('Refresh every overlay in TVU Go now? Use this to apply new features or after code updates.')) return; const rv=String(Date.now()); Promise.all(OVS.map(o=>api('/api/overlay',{name:o.id,cfg:{reload:rv}}))).then(()=>{toast('All overlays reloading in TVU (~10s)');refresh(true);}).catch(e=>{if(e.message!=='Session expired')toast(e.message,true);}); });
  em.appendChild(er);
  m.appendChild(em);

  const g=document.createElement('div'); g.className='ovgrid';
  OVS.forEach(o=>{
    const cfg=(OV&&OV[o.id])||{};
    const hidden=!!cfg.hidden;
    const card=document.createElement('div'); card.className='ovcard';
    card.innerHTML='<div class="row"><h3>'+o.t+'</h3>'+
      (hidden?'<span class="chip off"><span class="d"></span>Hidden</span>':'<span class="chip on"><span class="d"></span>Visible</span>')+
      '</div><div class="desc">'+o.d+'</div>'+
      '<div class="cfg">'+((typeof cfg.px==='number')?('position '+cfg.px+'%, '+cfg.py+'% · '+(cfg.scale||1)+'×'):'default position')+(cfg.calib?' · 📐 CALIBRATING':'')+
      (o.al?((cfg.snd?' · sound: '+cfg.snd:' · sound: sparkle')+(typeof cfg.vol==='number'?(' · vol '+cfg.vol):'')):'')+'</div>';
    const rr=document.createElement('div'); rr.className='row';
    const mk=(t,fn,sec)=>{const b=document.createElement('button');b.className='btn sm'+(sec?' sec':'');b.textContent=t;b.onclick=fn;rr.appendChild(b);return b;};
    mk(hidden?'👁 Show':'👁 Hide',()=>api('/api/overlay',{name:o.id,cfg:{hidden:!hidden}})
      .then(()=>{toast(o.t+(hidden?' shown':' hidden')+' on stream');refresh(true);}).catch(e=>{if(e.message!=='Session expired')toast(e.message,true);}));
    const ed=document.createElement('a'); ed.className='btn sec sm'; ed.textContent='✥ Move & resize';
    ed.href=o.u+'?edit=1'; ed.target='_blank'; rr.appendChild(ed);
    const pv=document.createElement('a'); pv.className='btn sec sm'; pv.textContent='Preview';
    pv.href=o.u+(o.al?'?test=1':''); pv.target='_blank'; rr.appendChild(pv);
    mk('Reset pos',()=>api('/api/overlay',{name:o.id,cfg:{px:null,py:null,scale:null,w:null,h:null}})
      .then(()=>{toast(o.t+' back to default position');refresh(true);}).catch(e=>{if(e.message!=='Session expired')toast(e.message,true);}),true);
    card.appendChild(rr);
    // live background transparency
    const tr=document.createElement('div'); tr.className='row'; tr.style.cssText='margin-top:10px;gap:8px';
    const tl2=document.createElement('span'); tl2.className='muted'; tl2.textContent='Background';
    const rng=document.createElement('input'); rng.type='range'; rng.min='0'; rng.max='100'; rng.step='5';
    rng.style.cssText='flex:1;min-width:110px;accent-color:var(--gold);padding:0;min-height:auto';
    rng.value=(typeof cfg.bgop==='number')?Math.round(cfg.bgop*100):100;
    const pv2=document.createElement('span'); pv2.className='muted'; pv2.style.minWidth='40px'; pv2.textContent=rng.value+'%';
    rng.oninput=()=>{pv2.textContent=rng.value+'%';};
    rng.onchange=()=>api('/api/overlay',{name:o.id,cfg:{bgop:+(rng.value/100).toFixed(2)}})
      .then(()=>{toast(o.t+' background set to '+rng.value+'%');refresh(true);})
      .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
    tr.append(tl2,rng,pv2);
    card.appendChild(tr);
    // live style: restyle this overlay with CSS, no reload
    const cssD=document.createElement('details'); cssD.style.marginTop='10px';
    const cssS=document.createElement('summary'); cssS.style.cssText='cursor:pointer;font-weight:800;color:var(--gold-soft);font-size:12.5px;list-style:none';
    cssS.textContent='🎨 Live style (advanced)';
    cssD.appendChild(cssS);
    const cssHint=document.createElement('div'); cssHint.className='muted'; cssHint.style.margin='7px 0';
    cssHint.innerHTML='Type CSS to restyle this overlay on the fly. Example bigger Campus clock: <code>#clock{font-size:22px}</code>. Bigger sub number: <code>#num{font-size:56px}</code>.';
    const cssTa=document.createElement('textarea'); cssTa.value=(cfg.css||''); cssTa.placeholder='#clock{font-size:22px}'; cssTa.style.width='100%'; cssTa.rows=3;
    const cssRow=document.createElement('div'); cssRow.className='row'; cssRow.style.marginTop='6px';
    const cssApply=document.createElement('button'); cssApply.className='btn sm'; cssApply.textContent='Apply live';
    cssApply.onclick=()=>api('/api/overlay',{name:o.id,cfg:{css:cssTa.value}})
      .then(()=>{toast(o.t+' style applied live');refresh(true);})
      .catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
    const cssClear=document.createElement('button'); cssClear.className='btn sec sm'; cssClear.textContent='Clear';
    cssClear.onclick=()=>{cssTa.value='';api('/api/overlay',{name:o.id,cfg:{css:''}})
      .then(()=>{toast(o.t+' style cleared');refresh(true);}).catch(e=>{});};
    cssRow.append(cssApply,cssClear);
    cssD.append(cssHint,cssTa,cssRow);
    card.appendChild(cssD);
    if(o.al){
      const ax=document.createElement('div'); ax.className='alx';
      const selL=document.createElement('label'); selL.textContent='Sound';
      const sel=document.createElement('select');
      SOUNDS.forEach(s2=>{const op=document.createElement('option');op.value=s2;op.textContent=s2;
        if((cfg.snd||'sparkle')===s2)op.selected=true;sel.appendChild(op);});
      selL.appendChild(sel);
      const volL=document.createElement('label'); volL.textContent='Volume (0 to 2)';
      const vol=document.createElement('input'); vol.type='number'; vol.min='0'; vol.max='2'; vol.step='0.1';
      vol.value=(typeof cfg.vol==='number')?cfg.vol:1; volL.appendChild(vol);
      const holdL=document.createElement('label'); holdL.textContent='Seconds on screen';
      const hold=document.createElement('input'); hold.type='number'; hold.min='3'; hold.max='20';
      hold.value=(typeof cfg.hold==='number')?cfg.hold:7; holdL.appendChild(hold);
      const svL=document.createElement('label'); svL.textContent=' ';
      const sv=document.createElement('button'); sv.className='btn sm'; sv.textContent='💾 Save alert settings';
      sv.onclick=()=>api('/api/overlay',{name:'alerts',cfg:{snd:sel.value,vol:+vol.value,hold:+hold.value}})
        .then(()=>{toast('Alert sound settings live');refresh(true);}).catch(e=>{if(e.message!=='Session expired')toast(e.message,true);});
      svL.appendChild(sv);
      ax.append(selL,volL,holdL,svL);
      card.appendChild(ax);
    }
    g.appendChild(card);
  });
  m.appendChild(g);
}

/* ================= SETUP / HELP ================= */
function rSetup(m){
  const base=location.href.replace(/[^/]*$/,'');
  const links=[
    ['Campus Feed','The main all in one overlay','campus.html'],
    ['Socials Bar','Twitch, YouTube, IG, TikTok, X','socials.html'],
    ['Sub Counter','Live sub count with goal','subs.html'],
    ['Alerts','Sub, gift, and raid pop ups','alerts.html']
  ];
  function copyBtn(url){
    const b=document.createElement('button'); b.className='btn sm'; b.textContent='Copy link';
    b.onclick=()=>{ const t=base+url;
      if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t);
      else { const x=document.createElement('textarea'); x.value=t; document.body.appendChild(x); x.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(x); }
      b.textContent='Copied ✓'; setTimeout(()=>b.textContent='Copy link',1300); };
    return b;
  }
  function steps(arr){ return '<div class="steps">'+arr.map(t=>'<div class="st">'+t+'</div>').join('')+'</div>'; }

  // overlay links
  const s1=document.createElement('div'); s1.className='sect';
  s1.innerHTML='<h2>Overlay links</h2><div class="setintro">Add each of these as a browser or web source in OBS or TVU Go. Tap Copy link, then paste it into your streaming software.</div>';
  links.forEach(([name,desc,file])=>{
    const row=document.createElement('div'); row.className='lnk';
    row.innerHTML='<div class="ln"><b>'+name+'</b><span class="muted" style="display:block;margin-bottom:5px">'+desc+'</span><code>'+base+file+'</code></div>';
    row.appendChild(copyBtn(file));
    s1.appendChild(row);
  });
  m.appendChild(s1);

  // OBS
  const s2=document.createElement('div'); s2.className='sect';
  s2.innerHTML='<h2>Add to OBS (recommended)</h2>'+steps([
    'In Sources, click the plus and choose <b>Browser</b>.',
    'Paste an overlay link from above into the URL field.',
    'Set <b>Width</b> to <code>1920</code> and <b>Height</b> to <code>1080</code>.',
    'For the Alerts source only, tick <b>Control audio via OBS</b> so alert sounds play in your mix.',
    'Click OK. The transparent background works automatically, no green screen needed.',
    'Repeat for each overlay, then position everything from the <b>Overlays</b> tab.'
  ]);
  m.appendChild(s2);

  // TVU Go
  const s3=document.createElement('div'); s3.className='sect';
  s3.innerHTML='<h2>Add to TVU Go</h2>'+steps([
    'Add a new web or browser overlay.',
    'Paste an overlay link from above as the URL.',
    'If TVU does not show transparency, add <code>?bg=00ff00</code> to the end of the link and chroma key out the green.',
    'Leave the layer at full screen. Do not move or resize it inside TVU.',
    'Repeat for each overlay, then position everything from the <b>Overlays</b> tab.'
  ]);
  m.appendChild(s3);

  // golden rule
  const s4=document.createElement('div'); s4.className='sect';
  s4.innerHTML='<h2>The golden rule</h2><div class="setbox gold">'+
    'In OBS or TVU, keep every overlay source at <b>full 1920 by 1080 and never drag or resize it there</b>. '+
    'Do all moving, sizing, hiding, transparency and styling from the <b>Overlays</b> tab in this hub. '+
    'That keeps the editor perfectly accurate to the stream and lets any of the three of you adjust things live from a phone. '+
    'If something looks off, open <b>Overlays</b>, tap <b>Calibration ON</b>, and check which layer is not hugging all four screen edges.</div>';
  m.appendChild(s4);

  // updates / reload
  const s5=document.createElement('div'); s5.className='sect';
  s5.innerHTML='<h2>Applying updates</h2><div class="setbox">'+
    '<b>Position, size, scale, hide, show and transparency</b> apply live right away. '+
    '<b>Fonts, colors and Live Style changes</b> take effect after the overlay reloads once. '+
    'To reload every source remotely without touching OBS or TVU, open <b>Overlays</b> and tap <b>Reload all overlays</b> under Emergency controls. '+
    'Sources that were added before today need one manual reload in OBS or TVU first to gain that remote reload ability.</div>';
  m.appendChild(s5);
}

function rActivity(m){
  const s=document.createElement('div'); s.className='sect';
  s.innerHTML='<h2>Mod activity</h2>'+
    ((ST.logs&&ST.logs.length)?ST.logs.map(l=>'<div class="actrow2">'+l.at+' · <b>'+(l.by||'-')+'</b> '+l.action+'</div>').join('')
      :'<div class="muted">No activity yet.</div>');

}

/* ---------- boot ---------- */
async function enterApp(){
  let w=null, netfail=false;
  try{
    const r=await fetch(API+'/api/whoami?token='+encodeURIComponent(sess.token));
    if(r.status===403){ logout(); $('loginerr').textContent='Session expired. Please log in again.'; return; }
    w=await r.json();
  }catch(e){ netfail=true; }
  if(netfail||!w||!w.ok){ showLogin('Can’t reach the server right now. Try again in a moment.'); return; }
  $('login').style.display='none'; $('app').style.display='block';
  $('who').textContent=sess.user;
  $('logout').onclick=logout;
  await refresh(true);
  if(!window._hubPoll) window._hubPoll=setInterval(()=>refresh(false),8000);
}
function boot(){ if(sess&&sess.token){ enterApp(); } else { showLogin(''); } }
boot();
