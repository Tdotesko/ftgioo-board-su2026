<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SU2026 Alerts</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#6b1d29; --maroon-deep:#4e131d;
    --gold:#ffb320; --gold-soft:#ffc95e; --red:#c31f2f; --red-deep:#8f1622;
    --cream:#f6e7c9; --cream-dim:#dcc9a4;
  }
  html,body{margin:0;padding:0;background:transparent;overflow:hidden}
  body{font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  #confetti{position:fixed;inset:0;pointer-events:none}
  #alert{
    position:fixed;top:8%;left:50%;
    display:flex;align-items:center;gap:20px;text-align:left;
    background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-deep) 100%);
    border:4px solid var(--gold);border-radius:22px;
    box-shadow:0 24px 70px -10px rgba(0,0,0,.7),
               inset 0 0 0 4px var(--maroon-deep),
               inset 0 0 0 7px var(--red);
    padding:20px 38px 20px 22px;
    opacity:0;transform:translateX(-50%) scale(.6);pointer-events:none;
    transition:opacity .45s,transform .45s cubic-bezier(.2,1.5,.4,1);
  }
  #alert.show{opacity:1;transform:translateX(-50%) scale(1)}
  #alert.shake img,#alert.shake>div{animation:shake .55s ease .5s}
  @keyframes shake{0%,100%{transform:rotate(0)}
    25%{transform:rotate(-1.6deg) scale(1.03)}
    75%{transform:rotate(1.6deg) scale(1.03)}}
  #alert img{width:110px;height:110px;object-fit:contain;
    filter:drop-shadow(0 5px 10px rgba(0,0,0,.45))}
  .a1{font-family:'Graduate',serif;font-size:16px;letter-spacing:4px;color:var(--cream);
    text-transform:uppercase}
  .a1 .hl{color:var(--red);background:var(--gold);border-radius:6px;padding:2px 8px;
    letter-spacing:2px;text-shadow:none}
  .a2{font-family:'Graduate',serif;font-size:40px;color:var(--gold);margin-top:6px;line-height:1.08;
    text-shadow:3px 3px 0 var(--red-deep),4px 4px 0 rgba(0,0,0,.35);max-width:640px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .a3{font-weight:800;font-size:19px;color:var(--cream-dim);margin-top:8px}
  .a3 b{color:var(--cream)}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="alert">
  <img src="crest.png" alt="">
  <div>
    <div class="a1" id="a1">💜 New Sub</div>
    <div class="a2" id="a2"></div>
    <div class="a3" id="a3"></div>
  </div>
</div>

<script>
const Q=new URLSearchParams(location.search);
const CHANNEL=(Q.get('channel')||'ftgioo').toLowerCase();
const SOUND=Q.get('sound')!=='0';
const HOLD=Math.max(3,parseFloat(Q.get('hold')||'7'))*1000;
const $=id=>document.getElementById(id);

/* ---------- confetti ---------- */
const cv=$('confetti'),cx=cv.getContext('2d');
let parts=[];
function sizeCanvas(){cv.width=innerWidth;cv.height=innerHeight;}
sizeCanvas(); addEventListener('resize',sizeCanvas);
const COLORS=['#ffb320','#ffc95e','#c31f2f','#f6e7c9'];
function spawnOne(){
  parts.push({
    x:Math.random()*cv.width, y:-20,
    vx:(Math.random()-.5)*1.6, vy:1.2+Math.random()*2.2,
    w:6+Math.random()*7, h:9+Math.random()*9,
    r:Math.random()*Math.PI, vr:(Math.random()-.5)*.25,
    ph:Math.random()*100, sw:0.6+Math.random()*1.2,
    c:COLORS[Math.floor(Math.random()*COLORS.length)], life:1
  });
}
// Emit n pieces spread across dur ms — a sustained confetti rain, not a blink.
function burst(n,dur){
  const start=performance.now(); let spawned=0;
  (function emit(){
    const frac=Math.min(1,(performance.now()-start)/dur);
    const want=Math.floor(frac*n);
    while(spawned<want){ spawnOne(); spawned++; }
    if(spawned<n) requestAnimationFrame(emit);
  })();
}
(function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+30);
  parts.forEach(p=>{
    p.vy+=0.045; p.y+=p.vy;
    p.x+=p.vx+Math.sin((p.y+p.ph)/26)*p.sw;  // flutter
    p.r+=p.vr; p.life-=0.0022;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.r);
    cx.globalAlpha=Math.max(0,p.life);
    cx.fillStyle=p.c; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
  });
  requestAnimationFrame(loop);
})();

/* ---------- sounds ----------
   Pick with ?snd=chime|bell|coin|sparkle|tada|pop|fanfare  (default: chime)
   Volume with ?vol=0.5 (0 to 2). Or use any audio file: ?sndurl=yourfile.mp3 */
let SND=(Q.get('snd')||'sparkle').toLowerCase();
const VOL=Math.max(0,Math.min(2,parseFloat(Q.get('vol')||'1')||1));
const SNDURL=Q.get('sndurl')||'';
const API='https://ftgioo-su2026-api-production.up.railway.app';
const OVKEY='alerts';
let ovCfg=null, VOLR=VOL, volTouched=false, sndTouched=false;
function EVOL(){ return volTouched?VOLR:((ovCfg&&typeof ovCfg.vol==='number')?ovCfg.vol:VOL); }
function ESND(){ return (!sndTouched&&ovCfg&&ovCfg.snd&&SYNTHS[ovCfg.snd])?ovCfg.snd:SND; }
function EHOLD(){ return (ovCfg&&typeof ovCfg.hold==='number')?ovCfg.hold*1000:HOLD; }
function modkey(){
  let k=localStorage.getItem('ftgioo_ovkey');
  if(!k){ k=prompt('Mod key (to control live overlays):')||''; if(k) localStorage.setItem('ftgioo_ovkey',k); }
  return k;
}
async function ovPost(cfg){
  const r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:OVKEY,cfg,by:'editor',key:modkey()})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||!j.ok){ if(r.status===403) localStorage.removeItem('ftgioo_ovkey');
    throw new Error((j&&j.error)||('HTTP '+r.status)); }
  return j;
}
function tone(a,t,f,type,peak,dur){
  const o=a.createOscillator(),g=a.createGain();
  o.type=type; o.frequency.value=f;
  o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(Math.max(0.001,peak*EVOL()),t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.1);
}
const SYNTHS={
  chime:(a,t,big)=>{ tone(a,t,880,'sine',0.12,1.3); tone(a,t+0.22,1174.7,'sine',0.10,1.3);
    if(big) tone(a,t+0.44,1568,'sine',0.09,1.4); },
  bell:(a,t,big)=>{ const f=big?523.25:659.25;
    tone(a,t,f,'sine',0.14,2.0); tone(a,t,f*2.76,'sine',0.04,1.2); tone(a,t,f*5.4,'sine',0.015,0.6); },
  coin:(a,t,big)=>{ tone(a,t,987.77,'square',0.05,0.09); tone(a,t+0.09,1318.5,'square',0.05,0.42);
    if(big){ tone(a,t+0.3,987.77,'square',0.05,0.09); tone(a,t+0.39,1568,'square',0.05,0.5);} },
  sparkle:(a,t,big)=>{ const n=big?9:6;
    for(let i=0;i<n;i++) tone(a,t+i*0.055,800+i*220,'sine',0.06,0.5); },
  tada:(a,t,big)=>{ [523.25,659.25,784].forEach(f=>tone(a,t,f,'triangle',0.07,1.1));
    if(big) tone(a,t+0.12,1046.5,'triangle',0.07,1.3); },
  pop:(a,t,big)=>{ tone(a,t,440,'sine',0.12,0.28); tone(a,t+0.14,587.33,'sine',0.12,0.4);
    if(big) tone(a,t+0.28,880,'sine',0.10,0.5); },
  fanfare:(a,t,big)=>{ (big?[523.25,659.25,784,1046.5]:[523.25,659.25,784])
    .forEach((f,i)=>tone(a,t+i*0.13,f,'triangle',0.11,0.9)); }
};
function playSound(big){
  if(!SOUND) return;
  if(SNDURL){ try{ const au=new Audio(SNDURL); au.volume=Math.min(1,EVOL()); au.play(); }catch(e){} return; }
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    (SYNTHS[ESND()]||SYNTHS.sparkle)(a,a.currentTime,!!big);
  }catch(e){}
}

/* ---------- alert queue ---------- */
let queue=[],showing=false;
function enqueue(a){ queue.push(a); pump(); }
function pump(){
  if(showing||!queue.length) return;
  showing=true;
  const a=queue.shift();
  if(ovCfg&&ovCfg.hidden){ showing=false; return pump(); }
  $('a1').innerHTML=a.label;
  $('a2').textContent=a.name;
  $('a3').innerHTML=a.detail||'';
  const el=$('alert');
  el.classList.remove('show','shake'); void el.offsetWidth;
  el.classList.add('show'); if(a.big) el.classList.add('shake');
  burst(a.big?320:160, a.big?Math.max(6000,HOLD*0.9):Math.max(4000,HOLD*0.6));
  playSound(a.big);
  setTimeout(()=>{ el.classList.remove('show');
    setTimeout(()=>{ showing=false; pump(); },700);
  },EHOLD());
}

/* ---------- Twitch chat (anonymous) ---------- */
function unesc(v){return (v||'').replace(/\\s/g,' ').replace(/\\:/g,';').replace(/\\\\/g,'\\').replace(/\\r|\\n/g,' ');}
function parseTags(s){const o={};s.split(';').forEach(kv=>{const i=kv.indexOf('=');o[kv.slice(0,i)]=unesc(kv.slice(i+1));});return o;}
function tierOf(p){return p==='Prime'?'Prime':p==='2000'?'Tier 2':p==='3000'?'Tier 3':'Tier 1';}
const suppress={}; // swallow individual gifts that follow a gift bomb
let sock=null;
function connect(){
  try{ sock=new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }catch(e){ setTimeout(connect,5000); return; }
  sock.onopen=()=>{
    sock.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    sock.send('NICK justinfan'+(1000+Math.floor(Math.random()*80000)));
    sock.send('JOIN #'+CHANNEL);
  };
  sock.onmessage=e=>String(e.data).split('\r\n').forEach(handle);
  sock.onclose=()=>setTimeout(connect,3000);
  sock.onerror=()=>{try{sock.close();}catch(e){}};
}
function handle(line){
  if(!line) return;
  if(line.indexOf('PING')===0){ sock.send('PONG :tmi.twitch.tv'); return; }
  const m=line.match(/^@([^ ]+) :tmi\.twitch\.tv USERNOTICE #(\w+)/);
  if(!m||m[2].toLowerCase()!==CHANNEL) return;
  const t=parseTags(m[1]);
  const id=t['msg-id'];
  const who=t['display-name']||t['login']||'Someone';
  const anon=(t['login']||'')==='ananonymousgifter';
  const name=anon?'A Mystery Donor':who;
  if(id==='sub'){
    enqueue({label:'💜 <span class="hl">New Sub</span>',name:who,
      detail:'just subscribed! · <b>'+tierOf(t['msg-param-sub-plan'])+'</b>'});
  }else if(id==='resub'){
    const mo=parseInt(t['msg-param-cumulative-months'],10)||0;
    enqueue({label:'💜 <span class="hl">Resub</span>',name:who,
      detail:(mo?('<b>'+mo+' months</b> subscribed! · '):'resubscribed! · ')+'<b>'+tierOf(t['msg-param-sub-plan'])+'</b>'});
  }else if(id==='submysterygift'){
    const n=parseInt(t['msg-param-mass-gift-count'],10)||1;
    suppress[t['login']]=(suppress[t['login']]||0)+n;
    enqueue({label:'🎁 <span class="hl">Gifted Subs</span>',name:name,
      detail:'is gifting <b>'+n+' sub'+(n>1?'s':'')+'</b>!!',big:n>=5});
  }else if(id==='subgift'){
    if(suppress[t['login']]>0){ suppress[t['login']]--; return; }
    enqueue({label:'🎁 <span class="hl">Gifted Sub</span>',name:name,
      detail:'gifted a sub to <b>'+(t['msg-param-recipient-display-name']||'a student')+'</b>!'});
  }else if(id==='raid'){
    const n=parseInt(t['msg-param-viewerCount'],10)||0;
    enqueue({label:'🚨 <span class="hl">Campus Visit</span>',name:t['msg-param-displayName']||who,
      detail:'arrived with <b>'+n.toLocaleString()+' students</b>! Welcome to SU!',big:n>=50});
  }
}
connect();

/* ---------- test + edit modes ---------- */
if(Q.get('test')==='1'){
  // sound picker: tap to audition, the URL to use updates below
  const sp=document.createElement('div');
  sp.style.cssText='position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;background:#1b1016;border:2px solid #ffb320;border-radius:10px;padding:9px 12px;font-family:Archivo,sans-serif;max-width:96vw';
  const lbl=document.createElement('div');
  lbl.style.cssText='width:100%;text-align:center;color:#dcc9a4;font-size:11px;font-weight:700;margin-bottom:2px';
  lbl.textContent='Tap a sound to hear it, then add that ?snd= to your TVU Go URL';
  sp.appendChild(lbl);
  Object.keys(SYNTHS).forEach(name=>{
    const b=document.createElement('button');
    b.textContent=name;
    b.style.cssText='background:'+(name===SND?'#ffb320':'#2a161d')+';color:'+(name===SND?'#160a24':'#f6e7c9')+';border:1px solid #7d2433;border-radius:7px;padding:7px 12px;font-weight:800;font-size:12px;cursor:pointer';
    b.onclick=()=>{ SND=name; sndTouched=true;
      [...sp.querySelectorAll('button')].forEach(x=>{x.style.background='#2a161d';x.style.color='#f6e7c9';});
      b.style.background='#ffb320'; b.style.color='#160a24';
      playSound(false); url.textContent=location.origin+location.pathname+'?snd='+name;
    };
    sp.appendChild(b);
  });
  const ctr=document.createElement('div');
  ctr.style.cssText='width:100%;display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap';
  function mkbtn(txt,fn){const b=document.createElement('button');b.textContent=txt;
    b.style.cssText='background:#2a161d;color:#f6e7c9;border:1px solid #7d2433;border-radius:7px;padding:7px 12px;font-weight:800;font-size:12px;cursor:pointer';
    b.onclick=fn;ctr.appendChild(b);return b;}
  mkbtn('vol −',()=>{volTouched=true;VOLR=Math.max(0,+(VOLR-0.1).toFixed(2));playSound(false);});
  mkbtn('vol +',()=>{volTouched=true;VOLR=Math.min(2,+(VOLR+0.1).toFixed(2));playSound(false);});
  const sv=mkbtn('💾 Save live (sound + vol)',async()=>{
    sv.textContent='Saving…';
    try{ await ovPost({snd:ESND(),vol:+EVOL().toFixed(2)}); sv.textContent='Saved, live!'; }
    catch(e){ sv.textContent='Failed: '+e.message; }
    setTimeout(()=>{sv.textContent='💾 Save live (sound + vol)';},2200);
  });
  let hidNow=false;
  const hd=mkbtn('👁 Hide alerts',async()=>{
    try{ hidNow=!hidNow; await ovPost({hidden:hidNow});
      hd.textContent=hidNow?'👁 Show alerts':'👁 Hide alerts';
    }catch(e){ hidNow=!hidNow; }
  });
  sp.appendChild(ctr);
  const url=document.createElement('div');
  url.style.cssText='width:100%;text-align:center;color:#ffb320;font-size:11px;font-weight:700;margin-top:3px;user-select:all';
  url.textContent=location.origin+location.pathname+'?snd='+SND;
  sp.appendChild(url);
  document.body.appendChild(sp);
  const demo=[
    {label:'💜 <span class="hl">New Sub</span>',name:'PixelPanda',detail:'just subscribed! · <b>Tier 1</b>'},
    {label:'🎁 <span class="hl">Gifted Sub</span>',name:'Kaya',detail:'gifted a sub to <b>StreamerJoe</b>!'},
    {label:'🎁 <span class="hl">Gifted Subs</span>',name:'BigDonor99',detail:'is gifting <b>20 subs</b>!!',big:true},
    {label:'💜 <span class="hl">Resub</span>',name:'LoyalViewer',detail:'<b>8 months</b> subscribed! · <b>Tier 1</b>'},
    {label:'🚨 <span class="hl">Campus Visit</span>',name:'Poudii',detail:'arrived with <b>1,200 students</b>! Welcome to SU!',big:true}
  ];
  let i=0; enqueue(demo[0]);
  setInterval(()=>{ i=(i+1)%demo.length; enqueue(demo[i]); }, HOLD+3500);
}

// URL params: ?scale=1.3  ?y=8 (top offset %)  ?bg=00ff00  ?channel=  ?sound=0  ?hold=7  ?test=1
(function(){
  const el=$('alert');
  const bg=Q.get('bg');
  if(bg) document.body.style.background=/^[0-9a-fA-F]{6}$/.test(bg)?('#'+bg):bg;
  const y=parseFloat(Q.get('y'));
  if(!isNaN(y)) el.style.top=y+'%';
  const upx=parseFloat(Q.get('px')), upy=parseFloat(Q.get('py'));
  if(!isNaN(upx)&&!isNaN(upy)&&Q.get('edit')!=='1'){
    el.style.left=upx+'%'; el.style.top=upy+'%';
    const s0=parseFloat(Q.get('scale')||'1')||1;
    const st0=document.createElement('style');
    st0.textContent='#alert{transform:scale('+(s0*.6)+');transform-origin:top left}#alert.show{transform:scale('+s0+');transform-origin:top left}';
    document.head.appendChild(st0);
  }
  const s=parseFloat(Q.get('scale')||'1')||1;
  if(s!==1){
    el.style.transformOrigin='top center';
    // keep the centering transform working with scale
    const style=document.createElement('style');
    style.textContent='#alert{transform:translateX(-50%) scale('+(s*.6)+')}#alert.show{transform:translateX(-50%) scale('+s+')}';
    document.head.appendChild(style);
  }
})();

/* ---------- live remote settings ---------- */
let ovStyle=null;
function applyOvCfg(){
  if(!ovCfg||Q.get('edit')==='1') return;
  const el=document.getElementById('alert');
  if(!ovStyle){ ovStyle=document.createElement('style'); document.head.appendChild(ovStyle); }
  const sc=(typeof ovCfg.scale==='number')?ovCfg.scale:1;
  if(typeof ovCfg.px==='number'&&typeof ovCfg.py==='number'){
    el.style.left=ovCfg.px+'%'; el.style.top=ovCfg.py+'%';
    ovStyle.textContent='#alert{transform:scale('+(sc*.6)+');transform-origin:top left}#alert.show{transform:scale('+sc+');transform-origin:top left}';
  }else{
    if(typeof ovCfg.y==='number') el.style.top=ovCfg.y+'%';
    if(typeof ovCfg.scale==='number')
      ovStyle.textContent='#alert{transform:translateX(-50%) scale('+(sc*.6)+')}#alert.show{transform:translateX(-50%) scale('+sc+')}';
  }
}
async function pollOvCfg(){
  try{ const r=await fetch(API+'/api/overlay',{cache:'no-store'}); const j=await r.json();
    if(j.ok){ ovCfg=(j.overlays&&j.overlays[OVKEY])||{}; applyOvCfg(); } }catch(e){}
}
pollOvCfg(); setInterval(pollOvCfg,9000);
// drag/resize editor on the stream frame (?edit=1)
if(Q.get('edit')==='1'){
  (function(){
    const el=document.getElementById('alert');
    document.getElementById('a2').textContent='PixelPanda';
    document.getElementById('a3').innerHTML='just subscribed! · <b>Tier 1</b>';
    el.classList.add('show'); el.style.opacity='1';
    let s=parseFloat(Q.get('scale')||'1')||1;

  // stream-accurate stage: a 16:9 frame that IS the 1920x1080 stream canvas
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;inset:0;background:#0c0d12;display:flex;align-items:center;justify-content:center;z-index:1';
  const frame=document.createElement('div');
  frame.style.cssText='position:relative;aspect-ratio:16/9;width:min(100vw - 16px,(100vh - 116px)*16/9);background-color:#161a22;background-image:repeating-linear-gradient(0deg,transparent 0 59px,#ffffff0d 59px 60px),repeating-linear-gradient(90deg,transparent 0 59px,#ffffff0d 59px 60px);border:1px solid #3a3f4c;border-radius:6px;overflow:hidden;box-shadow:0 20px 60px -20px #000';
  const ftag=document.createElement('div');
  ftag.style.cssText='position:absolute;bottom:6px;right:10px;color:#5b6270;font:700 11px Archivo,sans-serif;letter-spacing:1px;pointer-events:none';
  ftag.textContent='STREAM FRAME · 1920 × 1080';
  frame.appendChild(ftag);
  stage.appendChild(frame);
  document.body.appendChild(stage);
  frame.appendChild(el);
  el.style.position='absolute'; el.style.zIndex='2'; el.style.visibility='';
  const fw=()=>frame.getBoundingClientRect();
  const fscale=()=>fw().width/1920;
  function place(pxPct,pyPct){
    el.style.left=pxPct+'%'; el.style.top=pyPct+'%';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform='scale('+(s*fscale())+')';
  }
  const spx=parseFloat(Q.get('px')), spy=parseFloat(Q.get('py'));
  place(isNaN(spx)?26:spx, isNaN(spy)?8:spy);
  const ecss=document.createElement('style');
  ecss.textContent='#edittb{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:6px;align-items:center;background:#1b1016;border:2px solid #ffb320;border-radius:10px;padding:8px 10px;font-family:Archivo,sans-serif;max-width:96vw;flex-wrap:wrap;justify-content:center}#edittb button{background:#ffb320;border:none;border-radius:6px;font-weight:800;font-size:15px;width:32px;height:32px;cursor:pointer}#edittb .cp{width:auto;padding:0 12px;font-size:12px}#edittb input{width:min(280px,40vw);font-size:11px;padding:7px;border-radius:6px;border:1px solid #7d2433;background:#2a161d;color:#f6e7c9}#edittb span{color:#ffb320;font-weight:800;font-size:13px;min-width:46px;text-align:center}';
  document.head.appendChild(ecss);
  const tb=document.createElement('div'); tb.id='edittb';
  tb.innerHTML='<button id="eMinus">−</button><span id="eScale"></span><button id="ePlus">+</button><input id="eUrl" readonly><button id="eCopy" class="cp">Copy URL</button><button id="eSave" class="cp">💾 Save live</button><button id="eHide" class="cp">👁 Hide</button>';
  document.body.appendChild(tb);
  function pcts(){ const r=el.getBoundingClientRect(), f=fw();
    return {px:+(((r.left-f.left)/f.width)*100).toFixed(2), py:+(((r.top-f.top)/f.height)*100).toFixed(2)}; }
  function urlNow(){ const q=new URLSearchParams(location.search);
    q.delete('edit'); q.delete('pos');
    if(s!==1) q.set('scale',s.toFixed(2)); else q.delete('scale');
    const p=pcts(); q.set('px',p.px); q.set('py',p.py);
    return location.origin+location.pathname+'?'+q.toString(); }
  function refresh(){ document.getElementById('eScale').textContent=s.toFixed(2)+'×';
    el.style.transform='scale('+(s*fscale())+')';
    document.getElementById('eUrl').value=urlNow(); }
  document.getElementById('ePlus').onclick=()=>{s=Math.min(3,+(s+0.05).toFixed(2));refresh();};
  document.getElementById('eMinus').onclick=()=>{s=Math.max(0.4,+(s-0.05).toFixed(2));refresh();};
  document.getElementById('eCopy').onclick=()=>{const i=document.getElementById('eUrl');
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(i.value);
    else{i.select();try{document.execCommand('copy')}catch(e){}}
    const b=document.getElementById('eCopy');b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy URL';},1200);};
  document.getElementById('eSave').onclick=async()=>{const b=document.getElementById('eSave');b.textContent='Saving…';
    try{const p=pcts();await ovPost({px:p.px,py:p.py,scale:+s.toFixed(2)});b.textContent='Saved, live!';}
    catch(err){b.textContent='Failed: '+err.message;}
    setTimeout(()=>{b.textContent='💾 Save live';},2200);};
  let hiddenNow=false;
  document.getElementById('eHide').onclick=async()=>{const b=document.getElementById('eHide');
    try{hiddenNow=!hiddenNow;await ovPost({hidden:hiddenNow});b.textContent=hiddenNow?'👁 Show':'👁 Hide';}
    catch(err){hiddenNow=!hiddenNow;}};
  el.style.cursor='move'; el.style.touchAction='none';
  let drag=null;
  el.addEventListener('pointerdown',e=>{const r=el.getBoundingClientRect();
    drag={dx:e.clientX-r.left,dy:e.clientY-r.top}; el.setPointerCapture(e.pointerId); e.preventDefault();});
  el.addEventListener('pointermove',e=>{ if(!drag)return; const f=fw();
    el.style.left=(e.clientX-drag.dx-f.left)+'px'; el.style.top=(e.clientY-drag.dy-f.top)+'px'; refresh();});
  el.addEventListener('pointerup',()=>{drag=null;refresh();});
  addEventListener('resize',()=>{ const p=pcts(); place(p.px,p.py); refresh(); });
  refresh();
  })();
}
</script>
</body>
</html>
