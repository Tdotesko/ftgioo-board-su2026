<meta charset="UTF-8">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎓%3C/text%3E%3C/svg%3E">

<style>
  :root{
    --maroon:#6b1d29; --maroon-deep:#4e131d;
    --gold:#ffb320; --gold-soft:#ffc95e; --red:#c31f2f; --red-deep:#8f1622;
    --cream:#f6e7c9; --cream-dim:#dcc9a4;
  }
  html,body{margin:0;padding:0;background:transparent;overflow:hidden}
  body{font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}

<script>
const Q=new URLSearchParams(location.search);
// ---- fidelity: normalize to a 1920x1080 stage scaled to the viewport ----
(function(){
  var st=document.getElementById('su-stage');
  if(!st){ st=document.createElement('div'); st.id='su-stage'; document.body.insertBefore(st, document.body.firstChild); }
  // NOTE: the #alert is deliberately NOT moved into the stage. It centers on the
  // real viewport (see #alert position:fixed) so it stays dead-center on any screen
  // shape TVU Go hands us (phones are not 16:9). The stage is only for #su-custom.
  [].forEach(function(id){ var e=document.getElementById(id); if(e && e.parentNode!==st) st.appendChild(e); });
  var _cu=document.getElementById('su-custom'); if(!_cu){_cu=document.createElement('div');_cu.id='su-custom';st.appendChild(_cu);}
  function suk(){
    var k=Math.min(innerWidth/1920, innerHeight/1080);
    if(!isFinite(k)||k<=0) k=1;
    document.documentElement.style.setProperty('--suk', k);
  }
  suk(); addEventListener('resize', suk); addEventListener('orientationchange', suk);
})();

const CHANNEL=(Q.get('channel')||'ftgioo').toLowerCase();
const SOUND=Q.get('sound')!=='0';
const HOLD=Math.max(3,parseFloat(Q.get('hold')||'7'))*1000;
const $=id=>document.getElementById(id);

/* ---------- confetti ---------- */
const cv=$('confetti'),cx=cv.getContext('2d');
let parts=[];
function sizeCanvas(){cv.width=innerWidth;cv.height=innerHeight;}
sizeCanvas(); addEventListener('resize',sizeCanvas);
const COLORS=['#ffb320','#ffc95e','#c31f2f','#f6e7c9'];
function spawnOne(){
  parts.push({
    x:Math.random()*cv.width, y:-20,
    vx:(Math.random()-.5)*1.6, vy:1.2+Math.random()*2.2,
    w:6+Math.random()*7, h:9+Math.random()*9,
    r:Math.random()*Math.PI, vr:(Math.random()-.5)*.25,
    ph:Math.random()*100, sw:0.6+Math.random()*1.2,
    c:COLORS[Math.floor(Math.random()*COLORS.length)], life:1
  });
}
// Emit n pieces spread across dur ms — a sustained confetti rain, not a blink.
function burst(n,dur){
  const start=performance.now(); let spawned=0;
  (function emit(){
    const frac=Math.min(1,(performance.now()-start)/dur);
    const want=Math.floor(frac*n);
    while(spawned<want){ spawnOne(); spawned++; }
    if(spawned<n) requestAnimationFrame(emit);
  })();
}
(function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+30);
  parts.forEach(p=>{
    p.vy+=0.045; p.y+=p.vy;
    p.x+=p.vx+Math.sin((p.y+p.ph)/26)*p.sw;  // flutter
    p.r+=p.vr; p.life-=0.0022;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.r);
    cx.globalAlpha=Math.max(0,p.life);
    cx.fillStyle=p.c; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
  });
  requestAnimationFrame(loop);
})();

/* ---------- sounds ----------
   Pick with ?snd=chime|bell|coin|sparkle|tada|pop|fanfare  (default: chime)
   Volume with ?vol=0.5 (0 to 2). Or use any audio file: ?sndurl=yourfile.mp3 */
let SND=(Q.get('snd')||'sparkle').toLowerCase();
const VOL=Math.max(0,Math.min(2,parseFloat(Q.get('vol')||'1')||1));
const SNDURL=Q.get('sndurl')||'';
const API='https://ftgioo-su2026-api-production.up.railway.app';
const OVKEY='alerts';
let suLastReload, suLastTest;
let ovCfg=null, VOLR=VOL, volTouched=false, sndTouched=false;
const URLBGOP=(function(){const v=parseFloat(Q.get('bgop'));return isNaN(v)?1:Math.max(0,Math.min(1,v));})();
document.getElementById('alert').style.setProperty('--bgop',URLBGOP);
(function(){ const uw=parseFloat(Q.get('w')), uh=parseFloat(Q.get('h'));
  const t=document.getElementById('alert');
  if(!isNaN(uw)) t.style.width=uw+'px';
  if(!isNaN(uh)) t.style.height=uh+'px'; })();
function EVOL(){ return volTouched?VOLR:((ovCfg&&typeof ovCfg.vol==='number')?ovCfg.vol:VOL); }
function ESND(){ return (!sndTouched&&ovCfg&&ovCfg.snd&&SYNTHS[ovCfg.snd])?ovCfg.snd:SND; }
function EHOLD(){ return (ovCfg&&typeof ovCfg.hold==='number')?ovCfg.hold*1000:HOLD; }
function getSess(){ try{return JSON.parse(localStorage.getItem('su_hub_sess'));}catch(e){return null;} }
function askLogin(){
  return new Promise(function(resolve,reject){
    var old=document.getElementById('sulogin'); if(old) old.remove();
    var css=document.getElementById('sulogincss');
    if(!css){ css=document.createElement('style'); css.id='sulogincss';
      css.textContent='#sulogin{position:fixed;inset:0;background:rgba(10,5,8,.78);display:flex;align-items:center;justify-content:center;z-index:999;font-family:Archivo,sans-serif}#sulogin .bx{width:min(360px,92vw);background:linear-gradient(160deg,#3d1620,#24101a);border:3px solid #ffb320;border-radius:16px;padding:22px;text-align:center;box-shadow:0 30px 80px -20px #000,inset 0 0 0 3px #24101a,inset 0 0 0 5px #c31f2f}#sulogin h3{margin:0 0 4px;font-family:Graduate,serif;color:#ffb320;font-size:15px;letter-spacing:1.5px;text-shadow:1px 1px 0 #8f1622}#sulogin .m{color:#dcc9a4;font-size:12px;margin-bottom:14px}#sulogin .us{display:flex;gap:7px;margin-bottom:11px}#sulogin .u{flex:1;padding:11px 2px;border-radius:9px;border:2px solid #5d2b3c;background:#33161f;color:#c9ab9a;font-family:Graduate,serif;font-size:12.5px;cursor:pointer}#sulogin .u.sel{border-color:#ffb320;color:#ffb320;background:#3d1c14}#sulogin input{width:100%;box-sizing:border-box;background:#33161f;border:1px solid #5d2b3c;color:#f6e7c9;border-radius:9px;padding:11px;font-size:16px;text-align:center;margin-bottom:11px}#sulogin .bt{display:flex;gap:8px}#sulogin button.go{flex:1;background:#ffb320;color:#2a1108;border:none;border-radius:9px;padding:11px;font-weight:800;font-size:13px;cursor:pointer}#sulogin button.cx{flex:1;background:#33161f;color:#f6e7c9;border:1px solid #5d2b3c;border-radius:9px;padding:11px;font-weight:800;font-size:13px;cursor:pointer}#sulogin .er{color:#ff8a8a;font-size:12px;font-weight:700;min-height:16px;margin-top:8px}';
      document.head.appendChild(css);
    }
    var wrap=document.createElement('div'); wrap.id='sulogin';
    wrap.innerHTML='<div class="bx"><h3>Streamer University</h3><div class="m">Confirm your identity to control the live stream</div><div class="us"><button class="u sel" data-u="tdot">Tdot</button><button class="u" data-u="haylee">Haylee</button><button class="u" data-u="gio">Gio</button></div><input type="password" placeholder="your password" autocomplete="current-password"><div class="bt"><button class="go">Confirm</button><button class="cx">Cancel</button></div><div class="er"></div></div>';
    document.body.appendChild(wrap);
    var user='tdot';
    wrap.querySelectorAll('.u').forEach(function(b){ b.onclick=function(){ user=b.dataset.u;
      wrap.querySelectorAll('.u').forEach(function(x){x.classList.toggle('sel',x===b);}); }; });
    var inp=wrap.querySelector('input'), er=wrap.querySelector('.er'), go=wrap.querySelector('.go');
    setTimeout(function(){ inp.focus(); },50);
    function submit(){
      if(!inp.value){ er.textContent='Enter your password.'; return; }
      go.textContent='Checking…'; go.disabled=true;
      fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user:user,pass:inp.value})})
      .then(function(r){ return r.json().then(function(j){ return {r:r,j:j}; }); })
      .then(function(x){
        if(x.r.ok&&x.j.ok){
          try{ localStorage.setItem('su_hub_sess',JSON.stringify({token:x.j.token,user:x.j.user,exp:x.j.exp})); }catch(e){}
          wrap.remove(); resolve(x.j.token);
        }else{
          er.textContent=(x.j&&x.j.error)||'Login failed.';
          go.textContent='Confirm'; go.disabled=false;
        }
      })
      .catch(function(){ er.textContent='Cannot reach the server. Try again.'; go.textContent='Confirm'; go.disabled=false; });
    }
    go.onclick=submit;
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });
    wrap.querySelector('.cx').onclick=function(){ wrap.remove(); reject(new Error('Cancelled')); };
  });
}
async function ovToken(){ var s0=getSess(); if(s0&&s0.token) return s0.token; return askLogin(); }
async function ovPost(cfg){
  var token=await ovToken();
  var r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:OVKEY,cfg:cfg,token:token})});
  if(r.status===403){
    try{ localStorage.removeItem('su_hub_sess'); }catch(e){}
    token=await askLogin();
    r=await fetch(API+'/api/overlay',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:OVKEY,cfg:cfg,token:token})});
  }
  var j=await r.json().catch(function(){ return {}; });
  if(!r.ok||!j.ok) throw new Error((j&&j.error)||('HTTP '+r.status));
  return j;
}
function tone(a,t,f,type,peak,dur){
  const o=a.createOscillator(),g=a.createGain();
  o.type=type; o.frequency.value=f;
  o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(Math.max(0.001,peak*EVOL()),t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.1);
}
const SYNTHS={
  chime:(a,t,big)=>{ tone(a,t,880,'sine',0.12,1.3); tone(a,t+0.22,1174.7,'sine',0.10,1.3);
    if(big) tone(a,t+0.44,1568,'sine',0.09,1.4); },
  bell:(a,t,big)=>{ const f=big?523.25:659.25;
    tone(a,t,f,'sine',0.14,2.0); tone(a,t,f*2.76,'sine',0.04,1.2); tone(a,t,f*5.4,'sine',0.015,0.6); },
  coin:(a,t,big)=>{ tone(a,t,987.77,'square',0.05,0.09); tone(a,t+0.09,1318.5,'square',0.05,0.42);
    if(big){ tone(a,t+0.3,987.77,'square',0.05,0.09); tone(a,t+0.39,1568,'square',0.05,0.5);} },
  sparkle:(a,t,big)=>{ const n=big?9:6;
    for(let i=0;i<n;i++) tone(a,t+i*0.055,800+i*220,'sine',0.06,0.5); },
  tada:(a,t,big)=>{ [523.25,659.25,784].forEach(f=>tone(a,t,f,'triangle',0.07,1.1));
    if(big) tone(a,t+0.12,1046.5,'triangle',0.07,1.3); },
  pop:(a,t,big)=>{ tone(a,t,440,'sine',0.12,0.28); tone(a,t+0.14,587.33,'sine',0.12,0.4);
    if(big) tone(a,t+0.28,880,'sine',0.10,0.5); },
  fanfare:(a,t,big)=>{ (big?[523.25,659.25,784,1046.5]:[523.25,659.25,784])
    .forEach((f,i)=>tone(a,t+i*0.13,f,'triangle',0.11,0.9)); }
};
function playSound(big){
  if(!SOUND) return;
  if(SNDURL){ try{ const au=new Audio(SNDURL); au.volume=Math.min(1,EVOL()); au.play(); }catch(e){} return; }
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    (SYNTHS[ESND()]||SYNTHS.sparkle)(a,a.currentTime,!!big);
  }catch(e){}
}

/* ---------- alert queue ---------- */
let queue=[],showing=false;
function enqueue(a){ queue.push(a); pump(); }
function fireTestAlert(){ enqueue({label:'✨ <span class="hl">Test Alert</span>', name:'test', detail:'Alerts are working'}); }
function pump(){
  if(showing||!queue.length) return;
  showing=true;
  const a=queue.shift();
  if(ovCfg&&ovCfg.hidden){ showing=false; return pump(); }
  $('a1').innerHTML=a.label;
  $('a2').textContent=a.name;
  $('a3').innerHTML=a.detail||'';
  const el=$('alert');
  el.classList.remove('show','shake'); void el.offsetWidth;
  try{ if(typeof applyOvCfg==='function') applyOvCfg(); }catch(e){} // re-fit to this alert's size
  el.classList.add('show'); if(a.big) el.classList.add('shake');
  burst(a.big?320:160, a.big?Math.max(6000,HOLD*0.9):Math.max(4000,HOLD*0.6));
  playSound(a.big);
  setTimeout(()=>{ el.classList.remove('show');
    setTimeout(()=>{ showing=false; pump(); },700);
  },EHOLD());
}

/* ---------- Twitch chat (anonymous) ---------- */
function unesc(v){return (v||'').replace(/\\s/g,' ').replace(/\\:/g,';').replace(/\\\\/g,'\\').replace(/\\r|\\n/g,' ');}
function parseTags(s){const o={};s.split(';').forEach(kv=>{const i=kv.indexOf('=');o[kv.slice(0,i)]=unesc(kv.slice(i+1));});return o;}
function tierOf(p){return p==='Prime'?'Prime':p==='2000'?'Tier 2':p==='3000'?'Tier 3':'Tier 1';}
const suppress={}; // swallow individual gifts that follow a gift bomb
let sock=null;
function connect(){
  try{ sock=new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }catch(e){ setTimeout(connect,5000); return; }
  sock.onopen=()=>{
    sock.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    sock.send('NICK justinfan'+(1000+Math.floor(Math.random()*80000)));
    sock.send('JOIN #'+CHANNEL);
  };
  sock.onmessage=e=>String(e.data).split('\r\n').forEach(handle);
  sock.onclose=()=>setTimeout(connect,3000);
  sock.onerror=()=>{try{sock.close();}catch(e){}};
}
function handle(line){
  if(!line) return;
  if(line.indexOf('PING')===0){ sock.send('PONG :tmi.twitch.tv'); return; }
  const m=line.match(/^@([^ ]+) :tmi\.twitch\.tv USERNOTICE #(\w+)/);
  if(!m||m[2].toLowerCase()!==CHANNEL) return;
  const t=parseTags(m[1]);
  const id=t['msg-id'];
  const who=t['display-name']||t['login']||'Someone';
  const anon=(t['login']||'')==='ananonymousgifter';
  const name=anon?'A Mystery Donor':who;
  if(id==='sub'){
    enqueue({label:'💜 <span class="hl">New Sub</span>',name:who,
      detail:'just subscribed! · <b>'+tierOf(t['msg-param-sub-plan'])+'</b>'});
  }else if(id==='resub'){
    const mo=parseInt(t['msg-param-cumulative-months'],10)||0;
    enqueue({label:'💜 <span class="hl">Resub</span>',name:who,
      detail:(mo?('<b>'+mo+' months</b> subscribed! · '):'resubscribed! · ')+'<b>'+tierOf(t['msg-param-sub-plan'])+'</b>'});
  }else if(id==='submysterygift'){
    const n=parseInt(t['msg-param-mass-gift-count'],10)||1;
    suppress[t['login']]=(suppress[t['login']]||0)+n;
    enqueue({label:'🎁 <span class="hl">Gifted Subs</span>',name:name,
      detail:'is gifting <b>'+n+' sub'+(n>1?'s':'')+'</b>!!',big:n>=5});
  }else if(id==='subgift'){
    if(suppress[t['login']]>0){ suppress[t['login']]--; return; }
    enqueue({label:'🎁 <span class="hl">Gifted Sub</span>',name:name,
      detail:'gifted a sub to <b>'+(t['msg-param-recipient-display-name']||'a student')+'</b>!'});
  }else if(id==='raid'){
    const n=parseInt(t['msg-param-viewerCount'],10)||0;
    enqueue({label:'🚨 <span class="hl">Campus Visit</span>',name:t['msg-param-displayName']||who,
      detail:'arrived with <b>'+n.toLocaleString()+' students</b>! Welcome to SU!',big:n>=50});
  }
}
if(Q.get('demo')!=='1') connect();

// demo: show one persistent sample alert (for the canvas layout editor) with no sound/loop
if(Q.get('demo')==='1'){
  $('a1').innerHTML='💜 <span class="hl">New Sub</span>';
  $('a2').textContent='PixelPanda';
  $('a3').innerHTML='just subscribed! · <b>Tier 1</b>';
  var _da=$('alert'); _da.classList.add('show'); _da.style.opacity='1';

/* ---------- test + edit modes ---------- */
if(Q.get('test')==='1'){
  // sound picker: tap to audition, the URL to use updates below
  const sp=document.createElement('div');
  sp.style.cssText='position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;background:#1b1016;border:2px solid #ffb320;border-radius:10px;padding:9px 12px;font-family:Archivo,sans-serif;max-width:96vw';
  const lbl=document.createElement('div');
  lbl.style.cssText='width:100%;text-align:center;color:#dcc9a4;font-size:11px;font-weight:700;margin-bottom:2px';
  lbl.textContent='Tap a sound to hear it, then add that ?snd= to your TVU Go URL';
  sp.appendChild(lbl);
  Object.keys(SYNTHS).forEach(name=>{
    const b=document.createElement('button');
    b.textContent=name;
    b.style.cssText='background:'+(name===SND?'#ffb320':'#2a161d')+';color:'+(name===SND?'#160a24':'#f6e7c9')+';border:1px solid #7d2433;border-radius:7px;padding:7px 12px;font-weight:800;font-size:12px;cursor:pointer';
    b.onclick=()=>{ SND=name; sndTouched=true;
      [...sp.querySelectorAll('button')].forEach(x=>{x.style.background='#2a161d';x.style.color='#f6e7c9';});
      b.style.background='#ffb320'; b.style.color='#160a24';
      playSound(false); url.textContent=location.origin+location.pathname+'?snd='+name;
    };
    sp.appendChild(b);
  });
  const ctr=document.createElement('div');
  ctr.style.cssText='width:100%;display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap';
  function mkbtn(txt,fn){const b=document.createElement('button');b.textContent=txt;
    b.style.cssText='background:#2a161d;color:#f6e7c9;border:1px solid #7d2433;border-radius:7px;padding:7px 12px;font-weight:800;font-size:12px;cursor:pointer';
    b.onclick=fn;ctr.appendChild(b);return b;}
  mkbtn('vol −',()=>{volTouched=true;VOLR=Math.max(0,+(VOLR-0.1).toFixed(2));playSound(false);});
  mkbtn('vol +',()=>{volTouched=true;VOLR=Math.min(2,+(VOLR+0.1).toFixed(2));playSound(false);});
  const sv=mkbtn('💾 Save live (sound + vol)',async()=>{

      }else{
        // corners: proportional scale, opposite corner stays planted
        const rw1=(rs.w+dx)/rs.w, rw2=(rs.w-dx)/rs.w, rh1=(rs.h+dy)/rs.h, rh2=(rs.h-dy)/rs.h;
        let r=1;
        if(mode==='se')r=Math.max(rw1,rh1); else if(mode==='nw')r=Math.max(rw2,rh2);
        else if(mode==='ne')r=Math.max(rw1,rh2); else r=Math.max(rw2,rh1);
        s=Math.max(0.3,Math.min(3.5,+(rs.s0*r).toFixed(3)));
        const k2=s/rs.s0, nw2=rs.w*k2, nh2=rs.h*k2;
        let L=rs.L, T=rs.T;
        if(mode==='nw'){ L=rs.L+rs.w-nw2; T=rs.T+rs.h-nh2; }
        else if(mode==='ne'){ T=rs.T+rs.h-nh2; }
        else if(mode==='sw'){ L=rs.L+rs.w-nw2; }
        el.style.left=L+'px'; el.style.top=T+'px';
        el.style.transform='scale('+(s*fscale())+')';
      }
      refresh(); syncSel();
    });
    hnd.addEventListener('pointerup',()=>{rs=null;refresh();syncSel();});
    sel.appendChild(hnd);
  });
  setInterval(syncSel,150);

  // body drag = move only (never resizes)
  let moved=false;
  let drag=null;
  el.addEventListener('pointerdown',e=>{if(!e.isPrimary)return;moved=true;const r=el.getBoundingClientRect();
    drag={dx:e.clientX-r.left,dy:e.clientY-r.top}; el.setPointerCapture(e.pointerId); e.preventDefault();});
  el.addEventListener('pointermove',e=>{ if(!drag)return; const f=fw();
    el.style.left=(e.clientX-drag.dx-f.left)+'px'; el.style.top=(e.clientY-drag.dy-f.top)+'px'; refresh(); syncSel();});
  el.addEventListener('pointerup',()=>{drag=null;refresh();syncSel();});

  // keyboard precision: arrows move 1px (Shift=10px), + / - fine-scale
  addEventListener('keydown',e=>{
    if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')) return;
    const step=e.shiftKey?10:1;
    const r0=el.getBoundingClientRect(), f0=fw();
    let L=r0.left-f0.left, T=r0.top-f0.top, hit=true;
    if(e.key==='ArrowLeft')L-=step; else if(e.key==='ArrowRight')L+=step;
    else if(e.key==='ArrowUp')T-=step; else if(e.key==='ArrowDown')T+=step;
    else if(e.key==='+'||e.key==='='){ s=Math.min(3.5,+(s+0.01).toFixed(3)); }
    else if(e.key==='-'||e.key==='_'){ s=Math.max(0.3,+(s-0.01).toFixed(3)); }
    else hit=false;
    if(!hit) return;
    e.preventDefault(); moved=true;
    el.style.left=L+'px'; el.style.top=T+'px';
    el.style.right='';el.style.bottom='';
    el.style.transformOrigin='top left';
    el.style.transform='scale('+(s*fscale())+')';
    refresh(); syncSel();
  });
  syncSel();
  addEventListener('resize',()=>{ const p=pcts(); place(p.px,p.py); refresh(); });
  refresh();
  // open the editor AT the live saved position so it matches the stream
  fetch('https://ftgioo-su2026-api-production.up.railway.app/api/overlay',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(j){
      if(!j.ok||moved||drag) return;
      var c=(j.overlays&&j.overlays['alerts'])||{};
      if(typeof c.scale==='number') s=c.scale;
      if(typeof c.w==='number') el.style.width=c.w+'px';
      if(typeof c.h==='number') el.style.height=c.h+'px';
      if(typeof c.px==='number'&&typeof c.py==='number') place(c.px,c.py);
      else el.style.transform='scale('+(s*fscale())+')';
      refresh();
    }).catch(function(){});
  })();
}
</script>
</body>
</html>
